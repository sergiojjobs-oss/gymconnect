# =============================================
# Perfil PROD — PostgreSQL en Railway
# =============================================

spring.datasource.url=${DB_URL}?prepareThreshold=0
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# "update" crea tablas si no existen y las actualiza sin borrar datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 desactivado en producción
spring.h2.console.enabled=false

# Actuator — solo health check expuesto
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Pool de conexiones optimizado
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
