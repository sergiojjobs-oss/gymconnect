# =============================================
# GYMCONNECT API — Configuración base
# =============================================

server.port=${PORT:8080}

# Perfil activo: "dev" en local, "prod" en Railway
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT — en producción se sobreescribe con variable de entorno
jwt.secret=${JWT_SECRET:gymconnect-secret-key-2026-muy-larga-para-ser-segura-512bits-ok}
jwt.expiration=86400000

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,https://gymconnect-navy.vercel.app}

# Planes
plan.free.max-clients=3
plan.free.price=0
plan.pro.price=10
plan.elite.price=25

# ImgBB
imgbb.api-key=${IMGBB_API_KEY:3ffdf775c9e4a87fbe5482ff4c766d16}

# PayPal
paypal.client-id=${PAYPAL_CLIENT_ID:TU_CLIENT_ID_SANDBOX}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:TU_CLIENT_SECRET_SANDBOX}
paypal.base-url=${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
