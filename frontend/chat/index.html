<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — MomentFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/config.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); font-family: var(--font); }

    /* ── Toggle button ─────────────────────────────────────── */
    .widget-toggle {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--brand); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 9990;
      box-shadow: 0 4px 20px rgba(22,163,74,0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.15s;
      color: #fff;
    }
    .widget-toggle:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(22,163,74,0.5); }
    .widget-toggle svg { width: 22px; height: 22px; pointer-events: none; }
    .widget-toggle .icon-close { display: none; }
    .widget-toggle.open .icon-chat  { display: none; }
    .widget-toggle.open .icon-close { display: block; }
    .widget-unread {
      position: absolute; top: -2px; right: -2px;
      min-width: 17px; height: 17px; padding: 0 4px;
      background: #dc2626; color: #fff; border-radius: 99px;
      font-size: 0.6rem; font-weight: 700;
      display: none; align-items: center; justify-content: center;
      border: 2px solid var(--bg); font-family: var(--font);
    }
    .widget-unread.show { display: flex; }

    /* ── Widget panel ──────────────────────────────────────── */
    .widget-panel {
      position: fixed;
      bottom: calc(1.5rem + 52px + 0.85rem);
      right: 1.5rem;
      width: 380px;
      height: 540px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 16px 56px rgba(0,0,0,0.5),
        0 4px 12px rgba(0,0,0,0.3);
      display: flex; flex-direction: column;
      z-index: 9989;
      transform: translateY(10px) scale(0.98);
      opacity: 0; pointer-events: none;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), opacity 0.18s ease;
      transform-origin: bottom right;
    }
    .widget-panel.open {
      transform: translateY(0) scale(1);
      opacity: 1; pointer-events: all;
    }

    /* ── Widget header ─────────────────────────────────────── */
    .w-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.75rem 1rem;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0; min-height: 52px;
    }
    .wh-back {
      width: 28px; height: 28px; border-radius: var(--radius);
      background: none; border: none; color: var(--text-2);
      cursor: pointer; display: none; align-items: center; justify-content: center;
      font-size: 0.95rem; line-height: 1; flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .wh-back:hover { background: var(--surface-3); color: var(--text); }
    .wh-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--brand); color: #fff;
      display: none; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 600; flex-shrink: 0;
    }
    .wh-info { flex: 1; min-width: 0; }
    .wh-title { font-size: 0.875rem; font-weight: 600; color: var(--text); line-height: 1.2; }
    .wh-status {
      font-size: 0.7rem; color: var(--muted);
      display: none; align-items: center; gap: 0.3rem; margin-top: 0.1rem;
    }
    .wh-status.visible { display: flex; }
    .wh-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .wh-status.online .wh-dot { background: #22c55e; }
    .wh-right { display: flex; align-items: center; gap: 0.35rem; margin-left: auto; flex-shrink: 0; }
    .ws-pill {
      font-size: 0.6rem; font-weight: 600; padding: 0.15rem 0.45rem;
      border-radius: 99px; white-space: nowrap;
    }
    .ws-pill.connected    { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.18); }
    .ws-pill.disconnected { background: rgba(248,113,113,0.08); color: #f87171; border: 1px solid rgba(248,113,113,0.18); }
    .wh-close {
      width: 26px; height: 26px; border-radius: var(--radius);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.82rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .wh-close:hover { background: var(--surface-3); color: var(--text); }

    /* ── Contacts view ─────────────────────────────────────── */
    .view-contacts { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .view-contacts.hidden { display: none; }
    .contact-search {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border-subtle); flex-shrink: 0;
    }
    .contact-search input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.45rem 0.75rem;
      font-size: 0.8rem; color: var(--text); font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .contact-search input::placeholder { color: var(--muted); }
    .contact-search input:focus { border-color: var(--brand); }
    .contact-list { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    /* Contact items */
    .chat-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 1rem; cursor: pointer;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.1s; position: relative;
    }
    .chat-item:last-child { border-bottom: none; }
    .chat-item:hover { background: rgba(255,255,255,0.025); }
    .chat-item.active { background: rgba(22,163,74,0.05); }
    .chat-item:hover .chat-delete-btn { display: flex; }

    .chat-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--brand); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 600; flex-shrink: 0;
    }
    .chat-avatar.grey { background: var(--surface-3); color: var(--text-2); }
    .chat-item-info { flex: 1; min-width: 0; }
    .chat-item-name {
      font-size: 0.83rem; font-weight: 500; color: var(--text);
      display: flex; align-items: center; gap: 0.35rem;
      margin-bottom: 0.15rem;
    }
    .chat-item-meta { display: flex; align-items: center; gap: 0.4rem; }
    .chat-item-preview { font-size: 0.74rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .chat-item-time  { font-size: 0.62rem; color: var(--muted); flex-shrink: 0; }
    .chat-badge { background: rgba(22,163,74,0.1); color: var(--brand-light); border-radius: 99px; font-size: 0.6rem; font-weight: 600; padding: 0.1rem 0.4rem; border: 1px solid rgba(22,163,74,0.15); white-space: nowrap; }
    .chat-badge.grey { background: var(--surface-3); color: var(--muted); border-color: var(--border-subtle); }
    .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); flex-shrink: 0; }
    .chat-delete-btn {
      display: none; background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.82rem; padding: 0.25rem 0.35rem;
      border-radius: var(--radius); align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.12s, color 0.12s;
    }
    .chat-delete-btn:hover { background: rgba(220,38,38,0.1); color: #f87171; }

    /* Empty contacts */
    .contacts-empty { padding: 2rem 1.25rem; text-align: center; color: var(--muted); font-size: 0.82rem; line-height: 1.6; }

    /* ── Chat view ─────────────────────────────────────────── */
    .view-chat { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .view-chat.visible { display: flex; }

    /* Messages area */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1rem 0.9rem;
      display: flex; flex-direction: column; gap: 0.25rem;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg { display: flex; flex-direction: column; max-width: 78%; position: relative; }
    .msg.mine   { align-self: flex-end;   align-items: flex-end; }
    .msg.theirs { align-self: flex-start; align-items: flex-start; }
    .msg-row { display: flex; align-items: flex-end; gap: 0.3rem; }
    .msg.mine .msg-row { flex-direction: row-reverse; }

    .msg-bubble {
      padding: 0.55rem 0.85rem; border-radius: 12px;
      font-size: 0.84rem; line-height: 1.5;
      word-break: break-word; cursor: pointer; user-select: text;
    }
    .msg.mine .msg-bubble {
      background: var(--brand); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.theirs .msg-bubble {
      background: var(--surface-3); color: var(--text);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 0.62rem; color: var(--muted);
      margin-top: 0.2rem; padding: 0 0.1rem;
      display: flex; align-items: center; gap: 0.2rem;
    }
    .tick { font-size: 0.68rem; }
    .tick.read { color: var(--brand-light); }

    /* Quote */
    .msg-quote {
      background: rgba(0,0,0,0.18); border-left: 2px solid rgba(255,255,255,0.25);
      border-radius: 4px; padding: 0.28rem 0.55rem; margin-bottom: 0.35rem;
      font-size: 0.75rem; color: rgba(255,255,255,0.6); line-height: 1.4;
    }
    .msg.theirs .msg-quote { border-left-color: var(--brand); color: var(--text-2); background: rgba(0,0,0,0.1); }
    .msg-quote strong { display: block; font-size: 0.68rem; color: var(--brand-light); margin-bottom: 0.08rem; }

    /* Deleted message */
    .msg-deleted {
      padding: 0.45rem 0.75rem; border-radius: 10px;
      font-size: 0.78rem; color: var(--muted); font-style: italic;
      border: 1px solid var(--border-subtle); background: transparent;
    }

    /* Date separator */
    .date-sep {
      align-self: center; font-size: 0.63rem; font-weight: 500;
      color: var(--muted); background: var(--surface-2);
      padding: 0.15rem 0.6rem; border-radius: 99px;
      margin: 0.5rem 0; border: 1px solid var(--border-subtle);
    }
    .msg-sistema {
      align-self: center; text-align: center; font-size: 0.72rem;
      color: var(--muted); padding: 0.35rem 0.75rem;
    }

    /* Typing indicator */
    .typing-indicator {
      align-self: flex-start; display: none;
      background: var(--surface-3); border: 1px solid var(--border-subtle);
      border-radius: 12px; border-bottom-left-radius: 4px;
      padding: 0.55rem 0.85rem; margin-bottom: 0.25rem;
    }
    .typing-indicator span {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); margin: 0 1.5px;
      animation: typingBounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

    /* Message hover actions */
    .msg-actions { display: none; gap: 0.2rem; align-items: center; flex-shrink: 0; }
    .msg:hover .msg-actions { display: flex; }
    .msg-action-btn {
      background: var(--surface-3); border: 1px solid var(--border);
      border-radius: 5px; padding: 0.18rem 0.32rem; font-size: 0.68rem;
      cursor: pointer; color: var(--text-2); line-height: 1;
      transition: all 0.1s;
    }
    .msg-action-btn:hover { border-color: var(--brand); color: var(--text); }
    .msg-action-btn.del:hover { background: rgba(220,38,38,0.1); color: #f87171; border-color: rgba(220,38,38,0.2); }

    /* No conversation selected */
    .no-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); gap: 0.5rem; text-align: center; padding: 2rem;
    }
    .no-chat p { font-size: 0.85rem; color: var(--text-2); margin: 0; }
    .no-chat small { font-size: 0.75rem; color: var(--muted); }

    /* ── Reply bar ─────────────────────────────────────────── */
    .reply-bar {
      display: none; align-items: center; gap: 0.65rem;
      background: var(--surface-2); border-top: 1px solid var(--border-subtle);
      padding: 0.5rem 1rem; flex-shrink: 0;
    }
    .reply-bar.visible { display: flex; }
    .reply-indicator { font-size: 0.85rem; color: var(--brand); flex-shrink: 0; }
    .reply-content { flex: 1; min-width: 0; }
    .reply-label { font-size: 0.65rem; font-weight: 600; color: var(--brand-light); margin-bottom: 0.05rem; }
    .reply-text  { font-size: 0.75rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reply-close { background: none; border: none; color: var(--muted); font-size: 0.82rem; cursor: pointer; padding: 0.2rem; line-height: 1; }
    .reply-close:hover { color: #f87171; }

    /* ── Input bar ─────────────────────────────────────────── */
    .chat-input-bar {
      background: var(--surface-2); border-top: 1px solid var(--border-subtle);
      padding: 0.65rem 0.85rem; display: flex; gap: 0.5rem;
      align-items: flex-end; flex-shrink: 0; position: relative;
    }
    .emoji-btn {
      background: none; border: none; font-size: 1.05rem; cursor: pointer;
      padding: 0.3rem; border-radius: var(--radius); line-height: 1;
      color: var(--muted); flex-shrink: 0; transition: background 0.12s, color 0.12s;
    }
    .emoji-btn:hover { background: var(--surface-3); color: var(--text); }
    .chat-input-bar textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.55rem 0.75rem;
      font-size: 0.84rem; font-family: inherit; color: var(--text);
      resize: none; max-height: 100px; min-height: 36px;
      line-height: 1.45; outline: none; transition: border-color 0.15s;
    }
    .chat-input-bar textarea::placeholder { color: var(--muted); }
    .chat-input-bar textarea:focus { border-color: var(--brand); }
    .send-btn {
      background: var(--brand); color: #fff; border: none;
      border-radius: var(--radius); padding: 0.55rem 0.85rem;
      font-size: 0.9rem; cursor: pointer; line-height: 1;
      font-family: inherit; flex-shrink: 0; transition: background 0.15s;
    }
    .send-btn:hover { background: var(--brand-hover); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Emoji picker ──────────────────────────────────────── */
    .emoji-picker {
      position: absolute; bottom: calc(100% + 0.5rem); left: 0.85rem;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 0.6rem;
      display: none; flex-wrap: wrap; gap: 0.2rem;
      width: 260px; max-height: 152px; overflow-y: auto; z-index: 100;
      scrollbar-width: thin;
    }
    .emoji-picker.open { display: flex; }
    .emoji-picker button { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 0.2rem; border-radius: 5px; transition: background 0.1s; }
    .emoji-picker button:hover { background: var(--surface-3); }

    /* ── Toast ─────────────────────────────────────────────── */
    @keyframes slideInToast { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Mobile ────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .widget-panel {
        width: calc(100vw - 2rem);
        height: 65dvh;
        right: 1rem;
        bottom: calc(1rem + 52px + 0.75rem);
        border-radius: 10px;
      }
      .widget-toggle { bottom: 1rem; right: 1rem; }
    }
    @media (max-height: 680px) {
      .widget-panel { height: calc(100dvh - 130px); }
    }
  </style>
</head>
<body>

<!-- Widget toggle button -->
<button class="widget-toggle" id="widgetToggle" onclick="toggleWidget()" aria-label="Abrir chat">
  <svg class="icon-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
  <span class="widget-unread" id="unreadBadge">0</span>
</button>

<!-- Widget panel -->
<div class="widget-panel" id="widgetPanel">

  <!-- Header -->
  <div class="w-header" id="wHeader">
    <button class="wh-back" id="whBack" onclick="volverListaChat()" title="Volver">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="wh-avatar" id="whAvatar"></div>
    <div class="wh-info">
      <div class="wh-title" id="whTitle">Mensajes</div>
      <div class="wh-status" id="whStatus">
        <span class="wh-dot"></span>
        <span id="chatStatus">En línea</span>
      </div>
    </div>
    <div class="wh-right">
      <span id="ws-status" class="ws-pill disconnected">● Desconectado</span>
      <button class="wh-close" onclick="toggleWidget()" title="Cerrar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- View: contact list -->
  <div class="view-contacts" id="viewContacts">
    <div class="contact-search">
      <input type="text" id="searchInput" placeholder="Buscar conversación…" oninput="filtrarContactos(this.value)" autocomplete="off">
    </div>
    <div class="contact-list" id="chatList">
      <div class="contacts-empty">Cargando…</div>
    </div>
  </div>

  <!-- View: active chat -->
  <div class="view-chat" id="viewChat">
    <div class="chat-messages" id="messages">
      <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="reply-bar" id="replyBar">
      <span class="reply-indicator">↩</span>
      <div class="reply-content">
        <div class="reply-label" id="replyLabel">Respondiendo</div>
        <div class="reply-text" id="replyText"></div>
      </div>
      <button class="reply-close" onclick="cancelarRespuesta()">✕</button>
    </div>
    <div class="chat-input-bar" style="position:relative;">
      <button class="emoji-btn" onclick="toggleEmojis()" title="Emojis">☺</button>
      <div class="emoji-picker" id="emojiPicker"></div>
      <textarea id="msgInput" placeholder="Escribe un mensaje…" rows="1"
        oninput="autoResize(this);enviarTyping();"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviar();}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="enviar()">↑</button>
    </div>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem('gc_user') || 'null');
const token = localStorage.getItem('gc_token');
if (!user || !token) window.location.href = '../login.html';

let stompClient = null;
let contactoActivo = null;
let lastMsgDate = null;
let replyingTo = null;
let typingTimer = null;
let typingHideTimer = null;
let unreadTotal = 0;

// ── Widget toggle ────────────────────────────────────────────────
function toggleWidget() {
  const panel = document.getElementById('widgetPanel');
  const toggle = document.getElementById('widgetToggle');
  const isOpen = panel.classList.toggle('open');
  toggle.classList.toggle('open', isOpen);
  if (isOpen) {
    // Clear unread badge when opening
    unreadTotal = 0;
    const badge = document.getElementById('unreadBadge');
    badge.classList.remove('show');
    badge.textContent = '0';
  }
}

function openWidget() {
  const panel = document.getElementById('widgetPanel');
  if (!panel.classList.contains('open')) toggleWidget();
}

// ── Notification sound ───────────────────────────────────────────
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    o.start(); o.stop(ctx.currentTime + 0.3);
  } catch {}
}

// ── Toast ────────────────────────────────────────────────────────
let toastTimer = null;
function mostrarToastMensaje(nombre, texto) {
  let toast = document.getElementById('msgToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'msgToast';
    toast.style.cssText = `
      position:fixed;bottom:calc(1.5rem + 52px + 0.75rem + 540px + 0.5rem);right:1.5rem;
      z-index:9991;background:var(--surface-2);border:1px solid var(--border);
      border-radius:var(--radius-lg);padding:0.75rem 1rem;min-width:220px;max-width:300px;
      display:flex;gap:0.65rem;align-items:flex-start;
      animation:slideInToast 0.2s ease;cursor:pointer;
      box-shadow:0 4px 20px rgba(0,0,0,0.4);
    `;
    toast.onclick = () => toast.remove();
    document.body.appendChild(toast);
  }
  const preview = texto.length > 55 ? texto.slice(0, 55) + '…' : texto;
  toast.innerHTML = `
    <div style="width:32px;height:32px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.82rem;color:#fff;flex-shrink:0;">${escapeHtml(nombre.charAt(0))}</div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:0.78rem;font-weight:600;color:var(--text);margin-bottom:0.15rem;">${escapeHtml(nombre)}</div>
      <div style="font-size:0.73rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(preview)}</div>
    </div>
  `;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast?.remove(), 4000);
}

// ── WebSocket ────────────────────────────────────────────────────
let wakeAttempted = false;
async function wakeBackend() {
  if (wakeAttempted) return; wakeAttempted = true;
  try {
    await fetch(`${API}/api/chat/contactos`, {
      headers: { Authorization: 'Bearer ' + token },
      signal: AbortSignal.timeout(8000)
    });
  } catch {}
}

function setStatus(text, cls) {
  const el = document.getElementById('ws-status');
  if (el) { el.textContent = text; el.className = 'ws-pill ' + cls; }
}

function conectarWS() {
  setStatus('● Conectando…', 'disconnected');
  stompClient = new StompJs.Client({
    webSocketFactory: () => new SockJS(`${API}/ws`),
    connectHeaders: { Authorization: 'Bearer ' + token },
    reconnectDelay: 4000,
    onConnect: () => {
      wakeAttempted = false;
      setStatus('● Conectado', 'connected');
      stompClient.subscribe(`/user/${user.email}/queue/mensajes`, f => recibirMensaje(JSON.parse(f.body)));
      stompClient.subscribe(`/user/${user.email}/queue/typing`,   f => recibirTyping(JSON.parse(f.body)));
      stompClient.subscribe(`/user/${user.email}/queue/presencia`, f => recibirPresencia(JSON.parse(f.body)));
    },
    onDisconnect:     () => { setStatus('● Reconectando…', 'disconnected'); wakeBackend(); },
    onStompError:     () => { setStatus('● Reconectando…', 'disconnected'); wakeBackend(); },
    onWebSocketError: () => { setStatus('● Reconectando…', 'disconnected'); wakeBackend(); }
  });
  stompClient.activate();
}

// ── Contacts ─────────────────────────────────────────────────────
async function cargarContactos() {
  let contactos = [];
  try {
    const res = await fetch(`${API}/api/chat/contactos`, { headers: { Authorization: 'Bearer ' + token } });
    if (res.ok) contactos = await res.json();
  } catch {}

  const lista = document.getElementById('chatList');
  lista.innerHTML = '';

  if (!contactos.length) {
    const esE = user?.rol === 'ENTRENADOR';
    lista.innerHTML = `<div class="contacts-empty">${esE ? 'Aún no tienes clientes.' : 'Sin contactos. Contrata un entrenador para chatear.'}</div>`;
    return;
  }

  contactos.forEach(c => {
    const div = document.createElement('div');
    div.className = 'chat-item';
    div.dataset.id = c.id;
    const nombreSafe = escapeHtml(c.nombre);
    const badgeHtml = c.esPagador
      ? `<span class="chat-badge">Cliente</span>`
      : `<span class="chat-badge grey">Contacto</span>`;
    div.innerHTML = `
      <div class="chat-avatar${c.esPagador ? '' : ' grey'}">${nombreSafe.charAt(0)}</div>
      <div class="chat-item-info">
        <div class="chat-item-name">${nombreSafe}${badgeHtml}</div>
        <div class="chat-item-meta">
          <div class="chat-item-preview">${escapeHtml(c.ultimoMensaje || 'Sin mensajes')}</div>
          ${c.ultimoMensajeFecha ? `<span class="chat-item-time">${formatHora(c.ultimoMensajeFecha)}</span>` : ''}
        </div>
      </div>
      <button class="chat-delete-btn" onclick="eliminarConversacion(event,${c.id})" title="Eliminar">✕</button>
    `;
    div.addEventListener('click', () => abrirChat(c));
    lista.appendChild(div);
  });
}

// ── Open conversation ─────────────────────────────────────────────
async function abrirChat(contacto) {
  contactoActivo = contacto;
  lastMsgDate = null;
  replyingTo = null;

  // Update widget header
  const whBack   = document.getElementById('whBack');
  const whAvatar = document.getElementById('whAvatar');
  const whTitle  = document.getElementById('whTitle');
  const whStatus = document.getElementById('whStatus');

  whBack.style.display   = 'flex';
  whAvatar.textContent   = escapeHtml(contacto.nombre.charAt(0));
  whAvatar.style.display = 'flex';
  whTitle.textContent    = contacto.nombre;
  whStatus.classList.add('visible');

  const wsOk = stompClient?.connected;
  const chatStatusEl = document.getElementById('chatStatus');
  if (chatStatusEl) chatStatusEl.textContent = wsOk ? 'En línea' : 'Conectando…';
  whStatus.className = 'wh-status visible' + (wsOk ? ' online' : '');

  // Switch views
  document.getElementById('viewContacts').classList.add('hidden');
  document.getElementById('viewChat').classList.add('visible');

  // Mark active contact + clear unread dot
  document.querySelectorAll('.chat-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id == contacto.id);
    if (el.dataset.id == contacto.id) el.querySelector('.unread-dot')?.remove();
  });

  // Open widget if closed
  openWidget();

  // Reset messages area
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>';
  cancelarRespuesta();
  construirEmojiPicker();

  // Mark read + check presence
  fetch(`${API}/api/chat/${contacto.id}/leer`, { method:'POST', headers: { Authorization:'Bearer '+token } }).catch(()=>{});
  fetch(`${API}/api/chat/presencia/${contacto.id}`, { headers: { Authorization:'Bearer '+token } })
    .then(r => r.ok ? r.json() : null)
    .then(d => { if (d) actualizarEstadoPresencia(d.online); })
    .catch(()=>{});

  // Load history
  try {
    const res = await fetch(`${API}/api/chat/${contacto.id}`, { headers: { Authorization:'Bearer '+token } });
    if (res.ok) (await res.json()).forEach(m => mostrarMensaje(m, m.remitenteId === user.id));
  } catch {
    mostrarMensajeSistema('Inicia el servidor para cargar el historial');
  }

  // Typing indicator stays at bottom
  const ti = document.getElementById('typingIndicator');
  if (ti) msgs.appendChild(ti);
  scrollAbajo();
  document.getElementById('msgInput')?.focus();
}

// ── Back to contact list ─────────────────────────────────────────
function volverListaChat() {
  contactoActivo = null;

  // Reset header
  const whBack   = document.getElementById('whBack');
  const whAvatar = document.getElementById('whAvatar');
  whBack.style.display   = 'none';
  whAvatar.style.display = 'none';
  document.getElementById('whTitle').textContent = 'Mensajes';
  document.getElementById('whStatus').classList.remove('visible');

  // Switch views
  document.getElementById('viewContacts').classList.remove('hidden');
  document.getElementById('viewChat').classList.remove('visible');

  // Reset messages
  document.getElementById('messages').innerHTML =
    '<div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>';
  cancelarRespuesta();
}

// ── Emojis ───────────────────────────────────────────────────────
const EMOJIS = ['😀','😂','🥰','😍','😎','🤩','😅','😭','😡','🥲','👍','👎','❤️','🔥','💪','🏋️','🎯','✅','⭐','🙌','🎉','💯','😤','🙏','🤔','😴','🤣','😊','😇','🥳','💥','🚀','⚡','🌟','💎','🏆','🥇','💚','✨'];

function construirEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  if (!picker) return;
  picker.innerHTML = EMOJIS.map(e => `<button onclick="insertEmoji('${e}')">${e}</button>`).join('');
}

function toggleEmojis() {
  document.getElementById('emojiPicker')?.classList.toggle('open');
}

function insertEmoji(e) {
  const ta = document.getElementById('msgInput');
  if (!ta) return;
  const pos = ta.selectionStart;
  ta.value = ta.value.slice(0, pos) + e + ta.value.slice(pos);
  ta.selectionStart = ta.selectionEnd = pos + e.length;
  ta.focus();
  document.getElementById('emojiPicker')?.classList.remove('open');
}

// ── Typing ───────────────────────────────────────────────────────
function enviarTyping() {
  if (!stompClient?.connected || !contactoActivo) return;
  clearTimeout(typingTimer);
  stompClient.publish({ destination: '/app/chat.typing', body: JSON.stringify({ destinatarioId: contactoActivo.id, escribiendo: true }) });
  typingTimer = setTimeout(() => {
    stompClient.publish({ destination: '/app/chat.typing', body: JSON.stringify({ destinatarioId: contactoActivo.id, escribiendo: false }) });
  }, 2000);
}

function recibirPresencia(data) {
  if (!contactoActivo || data.usuarioId != contactoActivo.id) return;
  actualizarEstadoPresencia(data.online);
}

function actualizarEstadoPresencia(online) {
  const chatStatusEl = document.getElementById('chatStatus');
  const whStatus     = document.getElementById('whStatus');
  if (chatStatusEl) chatStatusEl.textContent = online ? 'En línea' : 'Desconectado';
  if (whStatus) whStatus.className = 'wh-status visible' + (online ? ' online' : '');
}

function recibirTyping(data) {
  if (!contactoActivo || data.remitenteId != contactoActivo.id) return;
  const ind = document.getElementById('typingIndicator');
  const chatStatusEl = document.getElementById('chatStatus');
  if (!ind) return;
  if (data.escribiendo) {
    ind.style.display = 'block';
    if (chatStatusEl) chatStatusEl.textContent = 'escribiendo…';
    clearTimeout(typingHideTimer);
    typingHideTimer = setTimeout(() => {
      ind.style.display = 'none';
      if (chatStatusEl) chatStatusEl.textContent = 'En línea';
    }, 3000);
  } else {
    ind.style.display = 'none';
    if (chatStatusEl) chatStatusEl.textContent = 'En línea';
  }
  scrollAbajo();
}

// ── Send ─────────────────────────────────────────────────────────
function enviar() {
  const input = document.getElementById('msgInput');
  const texto = input?.value.trim();
  if (!texto || !contactoActivo) return;
  if (!stompClient?.connected) {
    wakeBackend();
    mostrarMensajeSistema('Reconectando… espera un momento');
    return;
  }
  const payload = { destinatarioId: contactoActivo.id, contenido: texto };
  if (replyingTo && !String(replyingTo.id).startsWith('tmp-')) payload.replyToId = replyingTo.id;
  stompClient.publish({ destination: '/app/chat.enviar', body: JSON.stringify(payload) });
  mostrarMensaje({ contenido: texto, remitenteId: user.id, fechaEnvio: new Date().toISOString(), replyTo: replyingTo ? { autor: 'Tú', texto: replyingTo.texto } : null }, true);
  scrollAbajo();
  input.value = ''; input.style.height = 'auto';
  cancelarRespuesta();
  document.getElementById('emojiPicker')?.classList.remove('open');
}

// ── Receive ──────────────────────────────────────────────────────
function recibirMensaje(msg) {
  if (contactoActivo && (msg.remitenteId == contactoActivo.id || msg.destinatarioId == contactoActivo.id)) {
    mostrarMensaje(msg, msg.remitenteId === user.id);
    scrollAbajo();
    if (msg.remitenteId != user.id) {
      playBeep();
      fetch(`${API}/api/chat/${msg.remitenteId}/leer`, { method:'POST', headers:{ Authorization:'Bearer '+token } }).catch(()=>{});
    }
  } else if (msg.remitenteId != user.id) {
    playBeep();
    // Unread dot on contact item
    const item = document.querySelector(`.chat-item[data-id="${msg.remitenteId}"]`);
    if (item && !item.querySelector('.unread-dot')) {
      const dot = document.createElement('span');
      dot.className = 'unread-dot';
      item.querySelector('.chat-item-info')?.appendChild(dot);
    }
    // Unread badge on toggle button
    unreadTotal++;
    const badge = document.getElementById('unreadBadge');
    badge.textContent = unreadTotal > 9 ? '9+' : unreadTotal;
    if (!document.getElementById('widgetPanel').classList.contains('open')) badge.classList.add('show');
    // Toast
    const nombre = msg.remitenteNombre || 'Nuevo mensaje';
    const preview = msg.eliminado ? 'Mensaje eliminado' : (msg.contenido || '');
    mostrarToastMensaje(nombre, preview);
  }
  actualizarPreview(msg);
}

// ── Render message ───────────────────────────────────────────────
let msgIdCounter = 0;
function mostrarMensaje(msg, esMio) {
  const msgs = document.getElementById('messages');
  if (!msgs) return;

  const fechaMsg = msg.fechaEnvio ? new Date(msg.fechaEnvio) : new Date();
  const diaKey = fechaMsg.toDateString();
  if (diaKey !== lastMsgDate) {
    lastMsgDate = diaKey;
    const sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.textContent = formatFecha(fechaMsg);
    const ti = document.getElementById('typingIndicator');
    if (ti) msgs.insertBefore(sep, ti); else msgs.appendChild(sep);
  }

  const id = msg.id || ('tmp-' + (++msgIdCounter));
  const hora = fechaMsg.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
  const tick = esMio ? `<span class="tick${msg.leido ? ' read' : ''}">✓✓</span>` : '';
  const quoteHtml = msg.replyTo
    ? `<div class="msg-quote"><strong>${escapeHtml(msg.replyTo.autor)}</strong>${escapeHtml(msg.replyTo.texto?.slice(0,70))}${msg.replyTo.texto?.length > 70 ? '…' : ''}</div>`
    : '';

  const div = document.createElement('div');
  div.className = 'msg ' + (esMio ? 'mine' : 'theirs');
  div.dataset.id = id;
  div.dataset.texto = msg.contenido;

  if (msg.eliminado) {
    div.innerHTML = `
      <div class="msg-deleted">Mensaje eliminado</div>
      <span class="msg-time">${hora}</span>
    `;
  } else {
    const textoEscapado = escapeHtml(msg.contenido).replace(/"/g,'&quot;');
    div.innerHTML = `
      <div class="msg-row">
        <div class="msg-bubble">${quoteHtml}${escapeHtml(msg.contenido)}</div>
        <div class="msg-actions">
          <button class="msg-action-btn" onclick="responderMsg('${id}','${textoEscapado}')" title="Responder">↩</button>
          <button class="msg-action-btn" onclick="copiarMsg('${textoEscapado}')" title="Copiar">⎘</button>
          ${esMio ? `<button class="msg-action-btn del" onclick="eliminarMensaje(this,'${id}')" title="Eliminar">✕</button>` : ''}
        </div>
      </div>
      <span class="msg-time">${hora} ${tick}</span>
    `;
  }

  const ti = document.getElementById('typingIndicator');
  if (ti) msgs.insertBefore(div, ti); else msgs.appendChild(div);
}

// ── Message actions ──────────────────────────────────────────────
function responderMsg(id, texto) {
  const textoReal = texto.replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  replyingTo = { id, texto: textoReal, autor: contactoActivo?.nombre };
  document.getElementById('replyLabel').textContent = 'Respondiendo a ' + replyingTo.autor;
  document.getElementById('replyText').textContent = textoReal;
  document.getElementById('replyBar').classList.add('visible');
  document.getElementById('msgInput')?.focus();
}

function copiarMsg(texto) {
  const textoReal = texto.replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  navigator.clipboard?.writeText(textoReal).catch(()=>{});
}

async function eliminarMensaje(btn, id) {
  const msgEl = btn.closest('.msg');
  if (!id.startsWith('tmp-')) {
    const r = await fetch(`${API}/api/chat/mensaje/${id}`, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
    if (!r.ok && r.status !== 404) return;
  }
  const bubble = msgEl.querySelector('.msg-bubble');
  if (bubble) {
    bubble.outerHTML = '<div class="msg-deleted">Mensaje eliminado</div>';
  }
  msgEl.querySelector('.msg-actions')?.remove();
}

function cancelarRespuesta() {
  replyingTo = null;
  document.getElementById('replyBar')?.classList.remove('visible');
}

// ── Delete conversation ──────────────────────────────────────────
async function eliminarConversacion(e, contactoId) {
  e.stopPropagation();
  if (!confirm('¿Eliminar esta conversación? Se borrarán todos los mensajes.')) return;
  const r = await fetch(`${API}/api/chat/${contactoId}/conversacion`, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
  if (r.ok) {
    if (contactoActivo?.id == contactoId) volverListaChat();
    cargarContactos();
  }
}

// ── Helpers ──────────────────────────────────────────────────────
function actualizarPreview(msg) {
  const id = msg.remitenteId === user.id ? msg.destinatarioId : msg.remitenteId;
  const el = document.querySelector(`.chat-item[data-id="${id}"] .chat-item-preview`);
  if (el) el.textContent = msg.contenido;
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
}

function scrollAbajo() {
  const m = document.getElementById('messages');
  if (m) m.scrollTop = m.scrollHeight;
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function formatFecha(fecha) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const ayer = new Date(hoy); ayer.setDate(ayer.getDate()-1);
  const d = new Date(fecha); d.setHours(0,0,0,0);
  if (d.getTime() === hoy.getTime()) return 'Hoy';
  if (d.getTime() === ayer.getTime()) return 'Ayer';
  return new Date(fecha).toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' });
}

function formatHora(iso) {
  const d = new Date(iso);
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  if (d >= hoy) return d.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
  const ayer = new Date(hoy); ayer.setDate(ayer.getDate()-1);
  if (d >= ayer) return 'Ayer';
  return d.toLocaleDateString('es-ES', { day:'numeric', month:'short' });
}

function filtrarContactos(q) {
  document.querySelectorAll('.chat-item').forEach(el => {
    const nombre = el.querySelector('.chat-item-name')?.textContent?.toLowerCase() || '';
    el.style.display = nombre.includes(q.toLowerCase()) ? '' : 'none';
  });
}

function mostrarMensajeSistema(texto) {
  const msgs = document.getElementById('messages');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = 'msg-sistema'; div.textContent = texto;
  const ti = document.getElementById('typingIndicator');
  if (ti) msgs.insertBefore(div, ti); else msgs.appendChild(div);
}

// ── Init ─────────────────────────────────────────────────────────
wakeBackend();
openWidget(); // auto-open on this page

cargarContactos().then(() => {
  const params = new URLSearchParams(window.location.search);
  const uid = params.get('userId') || params.get('contacto');
  const nombre = params.get('nombre');
  if (uid) {
    const item = document.querySelector(`.chat-item[data-id="${uid}"]`);
    if (item) {
      const nombreReal = item.querySelector('.chat-item-name')?.childNodes[0]?.textContent?.trim() || decodeURIComponent(nombre || uid);
      abrirChat({ id: +uid, nombre: nombreReal });
    } else if (nombre) {
      abrirChat({ id: +uid, nombre: decodeURIComponent(nombre) });
    }
  }
});
conectarWS();
</script>
