<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi espacio — MomentFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/config.js"></script>
  <script src="../js/mobile-nav.js"></script>
  <script src="../js/auth-guard.js" data-rol="CLIENTE"></script>
</head>
<body>
  <style>
    .dashboard-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 70px)}
    .sidebar{background:var(--dark-hero);border-right:1px solid rgba(255,255,255,.06);padding:2rem 1rem;display:flex;flex-direction:column;gap:.25rem}
    .sidebar-label{font-size:.65rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:var(--muted-light);padding:0 .75rem;margin:1rem 0 .4rem}
    .sidebar a{display:flex;align-items:center;gap:.6rem;padding:.65rem .75rem;border-radius:8px;font-size:.85rem;font-weight:600;color:var(--muted-light);transition:background var(--t),color var(--t);text-decoration:none}
    .sidebar a:hover{background:rgba(255,255,255,.06);color:var(--text-light)}
    .sidebar a.active{background:rgba(22,163,74,.15);color:var(--green-l);font-weight:700}
    .main{padding:2rem 2.5rem;overflow-y:auto;background:#0d1f15}

    /* Bienvenida */
    .bienvenida{margin-bottom:1.75rem}
    .bienvenida h1{font-size:1.6rem;font-weight:900;color:#eef7f1;letter-spacing:-.5px}
    .bienvenida p{color:rgba(160,210,170,.65);margin-top:.3rem;font-size:.9rem}

    /* Stats */
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
    .stat-mini{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1.25rem 1rem;text-align:center;position:relative;overflow:hidden;transition:transform .15s,border-color .2s}
    .stat-mini:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.16)}
    .stat-mini::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
    .stat-mini.c1::before{background:linear-gradient(90deg,#16a34a,#4ade80)}
    .stat-mini.c2::before{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
    .stat-mini.c3::before{background:linear-gradient(90deg,#d97706,#fbbf24)}
    .stat-mini .val{font-size:1.8rem;font-weight:900;margin-bottom:.2rem;letter-spacing:-1px}
    .stat-mini.c1 .val{color:#4ade80}
    .stat-mini.c2 .val{color:#a78bfa}
    .stat-mini.c3 .val{color:#fbbf24}
    .stat-mini .lbl{font-size:.75rem;color:rgba(160,210,170,.5);font-weight:600}

    /* Section label */
    .sec-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#4ade80;margin:0 0 .65rem;display:flex;align-items:center;gap:.5rem}
    .sec-label::after{content:"";flex:1;height:1px;background:rgba(74,222,128,.15)}

    /* Grid 2 */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}

    /* Cards */
    .entrenador-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1.5rem;display:flex;gap:1.25rem;align-items:center}
    .ent-avatar{width:60px;height:60px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.35rem;font-weight:900;color:#fff;background:var(--grad-main);overflow:hidden;border:2px solid rgba(74,222,128,.25)}
    .ent-avatar img{width:100%;height:100%;object-fit:cover}
    .ent-info{flex:1}
    .ent-info h3{font-size:1rem;font-weight:800;color:#eef7f1}
    .ent-info p{color:rgba(160,210,170,.6);font-size:.84rem;margin-top:.15rem}
    .ent-actions{margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap}
    .sin-entrenador{background:rgba(255,255,255,.025);border:1px dashed rgba(255,255,255,.12);border-radius:14px;padding:2rem;text-align:center;color:rgba(160,210,170,.45)}
    .sin-entrenador p{margin-top:.65rem;font-size:.88rem;line-height:1.6}

    .rutina-preview{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1.5rem}
    .rutina-preview h3{font-size:.88rem;font-weight:800;color:#eef7f1;margin-bottom:.85rem;display:flex;justify-content:space-between;align-items:center}
    .ejercicio-row{display:flex;align-items:center;gap:1rem;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem}
    .ejercicio-row:last-child{border-bottom:none}
    .ej-num{width:24px;height:24px;border-radius:50%;background:rgba(74,222,128,.12);color:#4ade80;font-size:.7rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ej-info{flex:1}
    .ej-info strong{display:block;font-weight:700;color:#eef7f1}
    .ej-info span{color:rgba(160,210,170,.55);font-size:.78rem}
    .ej-badge{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80;padding:.2rem .6rem;border-radius:6px;font-size:.72rem;font-weight:700;white-space:nowrap}

    .nutricion-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
    .nutricion-card h3{font-size:.88rem;font-weight:800;color:#eef7f1;margin-bottom:.85rem;display:flex;justify-content:space-between;align-items:center}
    .macro-row{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
    .macro{flex:1;min-width:65px;text-align:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.65rem .5rem}
    .macro .mv{font-size:1.05rem;font-weight:900;color:#eef7f1}
    .macro .ml{font-size:.62rem;color:rgba(160,210,170,.5);text-transform:uppercase;letter-spacing:.5px;margin-top:.2rem}
    .comida-row{padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem}
    .comida-row:last-child{border-bottom:none}
    .comida-row strong{display:block;font-weight:700;color:#eef7f1;margin-bottom:.1rem}
    .comida-row span{color:rgba(160,210,170,.55);font-size:.78rem}

    .progreso-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1.5rem}
    .progreso-card h3{font-size:.88rem;font-weight:800;color:#eef7f1;margin-bottom:.85rem;display:flex;justify-content:space-between;align-items:center}
    .historial-item{display:flex;align-items:center;gap:1rem;padding:.7rem 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem}
    .historial-item:last-child{border-bottom:none}
    .hist-fecha{width:80px;color:rgba(160,210,170,.5);font-size:.78rem;flex-shrink:0}
    .hist-peso{font-weight:800;font-size:1rem;color:#eef7f1;width:60px}
    .hist-stars{color:#d97706;font-size:.85rem}
    .mensaje-badge{display:inline-flex;align-items:center;justify-content:center;background:#dc2626;color:#fff;border-radius:99px;font-size:.65rem;font-weight:900;min-width:18px;height:18px;padding:0 4px}

    @media(max-width:768px){
      .dashboard-layout{grid-template-columns:1fr}
      .sidebar{display:none}
      .main{padding:1rem .85rem 5.5rem}
      .grid-2{grid-template-columns:1fr}
      .grid-3{grid-template-columns:1fr 1fr}
      .entrenador-card{flex-direction:column;align-items:flex-start}
      .ent-avatar{width:48px;height:48px}
    }
  </style><header>
  <div class="container">
    <a href="../index.html" class="logo">Moment<span>Fit</span></a>
    <nav><button class="btn btn-outline" style="font-size:.82rem" onclick="localStorage.clear();location.href='../login.html'">Cerrar sesion</button></nav>
  </div>
</header>

<div class="dashboard-layout">
  <aside class="sidebar">
    <span class="sidebar-label">Mi espacio</span>
    <a href="dashboard.html" class="active">🏠 Inicio</a>
    <a href="mi-rutina.html">💪 Mi rutina</a>
    <a href="mi-nutricion.html">🥗 Mi nutricion</a>
    <a href="mi-progreso.html">📈 Mi progreso</a>
    <a href="../chat/index.html">💬 Mensajes <span id="badgeNav" style="display:none" class="mensaje-badge"></span></a>
    <span class="sidebar-label">Buscar</span>
    <a href="buscar.html">🔍 Buscar entrenador</a>
    <a href="../login.html" onclick="localStorage.clear()">🚪 Salir</a>
  </aside>

  <main class="main">
    <div class="bienvenida">
      <h1 id="saludo">Hola 👋</h1>
      <p id="subtitulo">Aqui tienes el resumen de tu entrenamiento</p>
    </div>

    <div class="grid-3" id="statsRow" style="display:none">
      <div class="stat-mini c1"><div class="val" id="stPeso">—</div><div class="lbl">Ultimo peso (kg)</div></div>
      <div class="stat-mini c2"><div class="val" id="stSemanas">—</div><div class="lbl">Semanas registradas</div></div>
      <div class="stat-mini c3"><div class="val" id="stEnergia">—</div><div class="lbl">Energia media</div></div>
    </div>

    <div class="grid-2">
      <div>
        <p class="sec-label">Mi entrenador</p>
        <div id="entrenadorBlock"></div>
      </div>
      <div>
        <p class="sec-label">Rutina actual</p>
        <div id="rutinaBlock"></div>
      </div>
    </div>

    <p class="sec-label">Plan nutricional</p>
    <div id="nutricionBlock"></div>

    <p class="sec-label" style="margin-top:1.25rem">Historial de progreso</p>
    <div id="progresoBlock"></div>
  </main>
</div>

<script>
const token=()=>localStorage.getItem("gc_token");
const h=()=>({Authorization:"Bearer "+token()});

async function init(){
  const u=await fetch(`${API}/api/usuario/perfil`,{headers:h()}).then(r=>r.json()).catch(()=>null);
  if(u){
    document.getElementById("saludo").textContent="Hola, "+u.nombre+" 👋";
    document.getElementById("subtitulo").textContent="Aqui tienes el resumen de tu entrenamiento";
  }
  fetch(`${API}/api/chat/no-leidos`,{headers:h()})
    .then(r=>r.json()).then(d=>{
      const b=document.getElementById("badgeNav");
      if(d.total>0){b.textContent=d.total;b.style.display="inline-flex";}
    }).catch(()=>{});
  cargarEntrenador();
  cargarRutina();
  cargarNutricion();
  cargarProgreso();
}

async function cargarEntrenador(){
  const blk=document.getElementById("entrenadorBlock");
  try{
    const contactos=await fetch(`${API}/api/chat/contactos`,{headers:h()}).then(r=>r.json());
    if(!contactos.length){
      blk.innerHTML=`<div class="sin-entrenador"><span style="font-size:2rem">🏋️</span><p>Aun no tienes entrenador.<br>Busca uno y empieza hoy!</p><a href="buscar.html" class="btn btn-primary" style="margin-top:1rem;font-size:.85rem">Buscar entrenador</a></div>`;
      return;
    }
    const c=contactos[0];
    const ents=await fetch(`${API}/api/entrenadores`).then(r=>r.json());
    const ent=ents.find(e=>String(e.usuarioId)===String(c.id))||null;
    const ini=(c.nombre||"?").split(" ").map(n=>n[0]).join("").toUpperCase().slice(0,2);
    const avHtml=ent&&ent.fotoUrl
      ?`<div class="ent-avatar"><img src="${ent.fotoUrl}"/></div>`
      :`<div class="ent-avatar" style="background:${ent?.avatarColor||"var(--grad-main)"}">${ini}</div>`;
    blk.innerHTML=`<div class="entrenador-card">${avHtml}<div class="ent-info"><h3>${c.nombre}</h3><p>${ent?(ent.ciudad||"Entrenador personal"):"Entrenador personal"}</p>${ent?`<div style="color:#fbbf24;font-size:.8rem;margin-top:.25rem">${"★".repeat(Math.floor(ent.rating||5))} ${(ent.rating||5).toFixed(1)}</div>`:""}<div class="ent-actions"><a href="../chat/index.html" class="btn btn-primary" style="font-size:.78rem;padding:.45rem 1rem">💬 Mensaje</a>${ent?`<a href="perfil.html?id=${ent.id}" class="btn btn-outline" style="font-size:.78rem;padding:.45rem 1rem">Ver perfil</a>`:""}</div></div></div>`;
  }catch{blk.innerHTML=`<div class="sin-entrenador">No se pudo cargar</div>`;}
}

async function cargarRutina(){
  const blk=document.getElementById("rutinaBlock");
  try{
    const res=await fetch(`${API}/api/rutinas/mi-rutina`,{headers:h()});
    if(res.status===204){blk.innerHTML=`<div class="rutina-preview"><p style="color:rgba(160,210,170,.5);font-size:.88rem;text-align:center;padding:1rem">Tu entrenador aun no te ha asignado una rutina.</p></div>`;return;}
    const r=await res.json();
    const ejs=r.ejerciciosJson?JSON.parse(r.ejerciciosJson):[];
    const prev=ejs.slice(0,4);
    blk.innerHTML=`<div class="rutina-preview"><h3>${r.titulo} <a href="mi-rutina.html" style="font-size:.75rem;font-weight:600;color:#4ade80">Ver completa →</a></h3>${r.diasSemana?`<p style="font-size:.78rem;color:rgba(160,210,170,.5);margin-bottom:.75rem">📅 ${r.diasSemana}</p>`:""} ${prev.map((ej,i)=>`<div class="ejercicio-row"><div class="ej-num">${i+1}</div><div class="ej-info"><strong>${ej.nombre}</strong><span>${ej.series} series · ${ej.reps} reps${ej.descanso?" · "+ej.descanso+" descanso":""}</span></div></div>`).join("")}${ejs.length>4?`<p style="text-align:center;color:rgba(160,210,170,.4);font-size:.78rem;padding-top:.75rem">+${ejs.length-4} ejercicios mas</p>`:""}</div>`;
  }catch{blk.innerHTML=`<div class="rutina-preview"><p style="color:rgba(160,210,170,.4);text-align:center;padding:1rem">No se pudo cargar la rutina.</p></div>`;}
}

async function cargarNutricion(){
  const blk=document.getElementById("nutricionBlock");
  try{
    const res=await fetch(`${API}/api/nutricion/mi-plan`,{headers:h()});
    if(res.status===204){blk.innerHTML=`<div class="nutricion-card"><p style="color:rgba(160,210,170,.5);font-size:.88rem;text-align:center;padding:.5rem">Tu entrenador aun no te ha creado un plan nutricional.</p></div>`;return;}
    const p=await res.json();
    const comidas=p.comidasJson?JSON.parse(p.comidasJson):[];
    blk.innerHTML=`<div class="nutricion-card"><h3>${p.titulo} <a href="mi-nutricion.html" style="font-size:.75rem;font-weight:600;color:#4ade80">Ver completo →</a></h3>${p.caloriasTotal?`<div class="macro-row"><div class="macro"><div class="mv">${p.caloriasTotal}</div><div class="ml">kcal</div></div><div class="macro"><div class="mv">${p.proteinasG||"—"}g</div><div class="ml">Proteína</div></div><div class="macro"><div class="mv">${p.carbohidratosG||"—"}g</div><div class="ml">Carbs</div></div><div class="macro"><div class="mv">${p.grasasG||"—"}g</div><div class="ml">Grasas</div></div></div>`:""} ${comidas.slice(0,3).map(c=>`<div class="comida-row"><strong>${c.nombre}${c.hora?" · "+c.hora:""}</strong><span>${c.alimentos}</span></div>`).join("")}${comidas.length>3?`<p style="text-align:center;color:rgba(160,210,170,.4);font-size:.78rem;padding-top:.5rem">+${comidas.length-3} comidas mas</p>`:""}</div>`;
  }catch{blk.innerHTML=`<div class="nutricion-card"><p style="color:rgba(160,210,170,.4);text-align:center;padding:.5rem">No se pudo cargar el plan.</p></div>`;}
}

async function cargarProgreso(){
  const blk=document.getElementById("progresoBlock");
  try{
    const lista=await fetch(`${API}/api/progreso/mi-historial`,{headers:h()}).then(r=>r.json());
    if(!lista.length){
      blk.innerHTML=`<div class="progreso-card" style="text-align:center;padding:2rem"><span style="font-size:2rem">📊</span><p style="color:rgba(160,210,170,.5);margin:.75rem 0">Aun no has registrado tu progreso.</p><a href="mi-progreso.html" class="btn btn-primary" style="font-size:.85rem">Registrar primer check-in</a></div>`;
      return;
    }
    const stRow=document.getElementById("statsRow");
    stRow.style.display="grid";
    document.getElementById("stPeso").textContent=lista[0].peso?lista[0].peso+"kg":"—";
    document.getElementById("stSemanas").textContent=lista.length;
    const avg=lista.filter(x=>x.energia).reduce((a,b)=>a+b.energia,0)/lista.filter(x=>x.energia).length;
    document.getElementById("stEnergia").textContent=isNaN(avg)?"—":"⭐".repeat(Math.round(avg));
    blk.innerHTML=`<div class="progreso-card"><h3>Historial <a href="mi-progreso.html" style="font-size:.75rem;font-weight:600;color:#4ade80">Ver todo →</a></h3>${lista.slice(0,5).map(p=>`<div class="historial-item"><div class="hist-fecha">${new Date(p.fecha).toLocaleDateString("es-ES",{day:"numeric",month:"short"})}</div><div class="hist-peso">${p.peso?p.peso+"kg":"—"}</div><div class="hist-stars">${p.energia?"⭐".repeat(p.energia):""}</div><div style="flex:1;font-size:.78rem;color:rgba(160,210,170,.45);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.notas||""}</div></div>`).join("")}</div>`;
  }catch{blk.innerHTML=`<div class="progreso-card"><p style="color:rgba(160,210,170,.4);text-align:center;padding:1rem">No se pudo cargar el progreso.</p></div>`;}
}

init();
</script>
<script src="../js/sidebar-user.js"></script>
</body>
</html>
