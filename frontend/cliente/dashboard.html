<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi espacio — GymConnect</title>
  <link rel="stylesheet" href="../css/main.css" />
  <script src="../js/config.js"></script>
  <script src="../js/auth-guard.js" data-rol="CLIENTE"></script>
  <style>
    .dashboard-layout { display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 70px); }
    .sidebar { background:var(--dark-hero); border-right:1px solid rgba(255,255,255,0.06); padding:2rem 1rem; display:flex; flex-direction:column; gap:0.25rem; }
    .sidebar-label { font-size:0.65rem; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:var(--muted-light); padding:0 0.75rem; margin:1rem 0 0.4rem; }
    .sidebar a { display:flex; align-items:center; gap:0.6rem; padding:0.65rem 0.75rem; border-radius:8px; font-size:0.85rem; font-weight:600; color:var(--muted-light); transition:background var(--t),color var(--t); text-decoration:none; }
    .sidebar a:hover { background:rgba(255,255,255,0.06); color:var(--text-light); }
    .sidebar a.active { background:rgba(22,163,74,0.15); color:var(--green-l); font-weight:700; }
    .main { padding:2rem 2.5rem; overflow-y:auto; }
    .bienvenida { margin-bottom:2rem; }
    .bienvenida h1 { font-size:1.6rem; font-weight:800; }
    .bienvenida p { color:var(--muted); margin-top:0.3rem; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:1.25rem; }
    .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.25rem; }
    .stat-mini { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; text-align:center; }
    .stat-mini .val { font-size:1.8rem; font-weight:900; color:var(--green); }
    .stat-mini .lbl { font-size:0.78rem; color:var(--muted); margin-top:0.2rem; }
    .entrenador-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; display:flex; gap:1.25rem; align-items:center; }
    .ent-avatar { width:64px; height:64px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:900; color:#fff; background:var(--grad-main); overflow:hidden; }
    .ent-avatar img { width:100%; height:100%; object-fit:cover; }
    .ent-info h3 { font-size:1.05rem; font-weight:800; }
    .ent-info p { color:var(--muted); font-size:0.85rem; margin-top:0.2rem; }
    .ent-actions { margin-top:0.75rem; display:flex; gap:0.5rem; flex-wrap:wrap; }
    .sin-entrenador { background:var(--card); border:1px dashed var(--border); border-radius:12px; padding:2rem; text-align:center; color:var(--muted); }
    .rutina-preview { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; }
    .rutina-preview h3 { font-size:0.95rem; font-weight:800; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; }
    .ejercicio-row { display:flex; align-items:center; gap:1rem; padding:0.65rem 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
    .ejercicio-row:last-child { border-bottom:none; }
    .ej-num { width:24px; height:24px; border-radius:50%; background:rgba(22,163,74,0.15); color:var(--green); font-size:0.7rem; font-weight:900; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .ej-info { flex:1; }
    .ej-info strong { display:block; font-weight:700; color:var(--text); }
    .ej-info span { color:var(--muted); font-size:0.78rem; }
    .ej-badge { background:rgba(22,163,74,0.08); border:1px solid rgba(22,163,74,0.2); color:var(--green); padding:0.2rem 0.6rem; border-radius:6px; font-size:0.72rem; font-weight:700; white-space:nowrap; }
    .nutricion-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; }
    .nutricion-card h3 { font-size:0.95rem; font-weight:800; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; }
    .macro-row { display:flex; gap:0.75rem; margin-bottom:1rem; flex-wrap:wrap; }
    .macro { flex:1; min-width:70px; text-align:center; background:var(--bg); border-radius:8px; padding:0.6rem; }
    .macro .mv { font-size:1.1rem; font-weight:900; color:var(--text); }
    .macro .ml { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
    .comida-row { padding:0.6rem 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
    .comida-row:last-child { border-bottom:none; }
    .comida-row strong { display:block; font-weight:700; color:var(--text); margin-bottom:0.1rem; }
    .comida-row span { color:var(--muted); font-size:0.78rem; }
    .progreso-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; }
    .progreso-card h3 { font-size:0.95rem; font-weight:800; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; }
    .historial-item { display:flex; align-items:center; gap:1rem; padding:0.7rem 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
    .historial-item:last-child { border-bottom:none; }
    .hist-fecha { width:80px; color:var(--muted); font-size:0.78rem; flex-shrink:0; }
    .hist-peso { font-weight:800; font-size:1rem; color:var(--text); width:60px; }
    .hist-stars { color:#d97706; font-size:0.85rem; }
    .mensaje-badge { display:inline-flex; align-items:center; justify-content:center; background:#dc2626; color:#fff; border-radius:99px; font-size:0.65rem; font-weight:900; min-width:18px; height:18px; padding:0 4px; }
    @media(max-width:768px){ .dashboard-layout{grid-template-columns:1fr} .sidebar{display:none} .main{padding:1.25rem} .grid-2{grid-template-columns:1fr} .grid-3{grid-template-columns:repeat(2,1fr)} }
  </style>
</head>
<body>
<header>
  <div class="container">
    <a href="../index.html" class="logo">Gym<span>Connect</span></a>
    <nav>
      <button class="btn btn-outline" style="font-size:0.82rem;" onclick="localStorage.clear();location.href='../login.html'">Cerrar sesión</button>
    </nav>
  </div>
</header>

<div class="dashboard-layout">
  <aside class="sidebar">
    <span class="sidebar-label">Mi espacio</span>
    <a href="dashboard.html" class="active">🏠 Inicio</a>
    <a href="mi-rutina.html">💪 Mi rutina</a>
    <a href="mi-nutricion.html">🥗 Mi nutrición</a>
    <a href="mi-progreso.html">📈 Mi progreso</a>
    <a href="../chat/index.html">💬 Mensajes <span id="badgeNav" style="display:none" class="mensaje-badge"></span></a>
    <span class="sidebar-label">Buscar</span>
    <a href="buscar.html">🔍 Buscar entrenador</a>
    <a href="../login.html" onclick="localStorage.clear()">🚪 Salir</a>
  </aside>

  <main class="main">
    <div class="bienvenida">
      <h1 id="saludo">Hola 👋</h1>
      <p id="subtitulo">Aquí tienes el resumen de tu entrenamiento</p>
    </div>

    <!-- Stats rápidas -->
    <div class="grid-3" id="statsRow" style="display:none">
      <div class="stat-mini"><div class="val" id="stPeso">—</div><div class="lbl">Último peso (kg)</div></div>
      <div class="stat-mini"><div class="val" id="stSemanas">—</div><div class="lbl">Semanas registradas</div></div>
      <div class="stat-mini"><div class="val" id="stEnergia">—</div><div class="lbl">Energía media</div></div>
    </div>

    <div class="grid-2">
      <!-- Mi entrenador -->
      <div>
        <p style="font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:0.6rem;">Mi entrenador</p>
        <div id="entrenadorBlock"></div>
      </div>

      <!-- Mi rutina (preview) -->
      <div>
        <p style="font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:0.6rem;">Rutina actual</p>
        <div id="rutinaBlock"></div>
      </div>
    </div>

    <!-- Nutrición -->
    <p style="font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:0.6rem;">Plan nutricional</p>
    <div id="nutricionBlock" style="margin-bottom:1.25rem;"></div>

    <!-- Progreso -->
    <p style="font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:0.6rem;">Historial de progreso</p>
    <div id="progresoBlock"></div>
  </main>
</div>

<script>
const token = () => localStorage.getItem('gc_token');
const h = () => ({ Authorization: 'Bearer ' + token() });

async function init() {
  // Datos del usuario
  const u = await fetch(`${API}/api/usuario/perfil`, { headers: h() }).then(r => r.json()).catch(() => null);
  if (u) {
    document.getElementById('saludo').textContent = `Hola, ${u.nombre} 👋`;
    document.getElementById('subtitulo').textContent = 'Aquí tienes el resumen de tu entrenamiento';
  }

  // No leídos
  fetch(`${API}/api/chat/no-leidos`, { headers: h() })
    .then(r => r.json())
    .then(d => {
      const b = document.getElementById('badgeNav');
      if (d.total > 0) { b.textContent = d.total; b.style.display = 'inline-flex'; }
    }).catch(() => {});

  // Entrenador
  cargarEntrenador();

  // Rutina
  cargarRutina();

  // Nutrición
  cargarNutricion();

  // Progreso
  cargarProgreso();
}

async function cargarEntrenador() {
  const blk = document.getElementById('entrenadorBlock');
  try {
    const contactos = await fetch(`${API}/api/chat/contactos`, { headers: h() }).then(r => r.json());
    // Buscar el entrenador (primer contacto con relación activa)
    if (!contactos.length) {
      blk.innerHTML = `<div class="sin-entrenador"><span style="font-size:2rem;">🏋️</span><p style="margin-top:0.75rem;">Aún no tienes entrenador.<br>¡Busca uno y empieza hoy!</p><a href="buscar.html" class="btn btn-primary" style="margin-top:1rem;font-size:0.85rem;">Buscar entrenador</a></div>`;
      return;
    }
    const c = contactos[0];
    // Obtener perfil completo del entrenador
    const ents = await fetch(`${API}/api/entrenadores`).then(r => r.json());
    const ent = ents.find(e => String(e.usuarioId) === String(c.id)) || null;

    const inicEnt = (c.nombre||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    const avatarHtml = ent && ent.fotoUrl
      ? `<div class="ent-avatar"><img src="${ent.fotoUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /></div>`
      : `<div class="ent-avatar" style="background:${ent?.avatarColor||'var(--grad-main)'};">${inicEnt}</div>`;

    blk.innerHTML = `
      <div class="entrenador-card">
        ${avatarHtml}
        <div class="ent-info" style="flex:1">
          <h3>${c.nombre}</h3>
          <p>${ent ? (ent.ciudad || 'Entrenador personal') : 'Entrenador personal'}</p>
          ${ent ? `<div style="color:#d97706;font-size:0.8rem;margin-top:0.25rem;">${'★'.repeat(Math.floor(ent.rating||5))} ${(ent.rating||5).toFixed(1)}</div>` : ''}
          <div class="ent-actions">
            <a href="../chat/index.html" class="btn btn-primary" style="font-size:0.78rem;padding:0.45rem 1rem;">💬 Mensaje</a>
            ${ent ? `<a href="perfil.html?id=${ent.id}" class="btn btn-outline" style="font-size:0.78rem;padding:0.45rem 1rem;">Ver perfil</a>` : ''}
          </div>
        </div>
      </div>`;
  } catch {
    blk.innerHTML = `<div class="sin-entrenador">No se pudo cargar</div>`;
  }
}

async function cargarRutina() {
  const blk = document.getElementById('rutinaBlock');
  try {
    const res = await fetch(`${API}/api/rutinas/mi-rutina`, { headers: h() });
    if (res.status === 204) {
      blk.innerHTML = `<div class="rutina-preview"><p style="color:var(--muted);font-size:0.88rem;text-align:center;padding:1rem;">Tu entrenador aún no te ha asignado una rutina.</p></div>`;
      return;
    }
    const r = await res.json();
    const ejercicios = r.ejerciciosJson ? JSON.parse(r.ejerciciosJson) : [];
    const preview = ejercicios.slice(0, 4);
    blk.innerHTML = `
      <div class="rutina-preview">
        <h3>${r.titulo} <a href="mi-rutina.html" style="font-size:0.75rem;font-weight:600;color:var(--green);">Ver completa →</a></h3>
        ${r.diasSemana ? `<p style="font-size:0.78rem;color:var(--muted);margin-bottom:0.75rem;">📅 ${r.diasSemana}</p>` : ''}
        ${preview.map((ej, i) => `
          <div class="ejercicio-row">
            <div class="ej-num">${i+1}</div>
            <div class="ej-info">
              <strong>${ej.nombre}</strong>
              <span>${ej.series} series · ${ej.reps} reps${ej.descanso ? ' · ' + ej.descanso + ' descanso' : ''}</span>
            </div>
          </div>`).join('')}
        ${ejercicios.length > 4 ? `<p style="text-align:center;color:var(--muted);font-size:0.78rem;padding-top:0.75rem;">+${ejercicios.length-4} ejercicios más</p>` : ''}
      </div>`;
  } catch {
    blk.innerHTML = `<div class="rutina-preview"><p style="color:var(--muted);text-align:center;padding:1rem;">No se pudo cargar la rutina.</p></div>`;
  }
}

async function cargarNutricion() {
  const blk = document.getElementById('nutricionBlock');
  try {
    const res = await fetch(`${API}/api/nutricion/mi-plan`, { headers: h() });
    if (res.status === 204) {
      blk.innerHTML = `<div class="nutricion-card"><p style="color:var(--muted);font-size:0.88rem;text-align:center;padding:0.5rem;">Tu entrenador aún no te ha creado un plan nutricional.</p></div>`;
      return;
    }
    const p = await res.json();
    const comidas = p.comidasJson ? JSON.parse(p.comidasJson) : [];
    blk.innerHTML = `
      <div class="nutricion-card">
        <h3>${p.titulo} <a href="mi-nutricion.html" style="font-size:0.75rem;font-weight:600;color:var(--green);">Ver completo →</a></h3>
        ${p.caloriasTotal ? `<div class="macro-row">
          <div class="macro"><div class="mv">${p.caloriasTotal}</div><div class="ml">kcal</div></div>
          <div class="macro"><div class="mv">${p.proteinasG||'—'}g</div><div class="ml">Proteína</div></div>
          <div class="macro"><div class="mv">${p.carbohidratosG||'—'}g</div><div class="ml">Carbs</div></div>
          <div class="macro"><div class="mv">${p.grasasG||'—'}g</div><div class="ml">Grasas</div></div>
        </div>` : ''}
        ${comidas.slice(0,3).map(c => `
          <div class="comida-row">
            <strong>${c.nombre}${c.hora ? ' · ' + c.hora : ''}</strong>
            <span>${c.alimentos}</span>
          </div>`).join('')}
        ${comidas.length > 3 ? `<p style="text-align:center;color:var(--muted);font-size:0.78rem;padding-top:0.5rem;">+${comidas.length-3} comidas más</p>` : ''}
      </div>`;
  } catch {
    blk.innerHTML = `<div class="nutricion-card"><p style="color:var(--muted);text-align:center;padding:0.5rem;">No se pudo cargar el plan.</p></div>`;
  }
}

async function cargarProgreso() {
  const blk = document.getElementById('progresoBlock');
  try {
    const lista = await fetch(`${API}/api/progreso/mi-historial`, { headers: h() }).then(r => r.json());
    if (!lista.length) {
      blk.innerHTML = `<div class="progreso-card" style="text-align:center;padding:2rem;">
        <span style="font-size:2rem;">📊</span>
        <p style="color:var(--muted);margin:0.75rem 0;">Aún no has registrado tu progreso.</p>
        <a href="mi-progreso.html" class="btn btn-primary" style="font-size:0.85rem;">Registrar primer check-in</a>
      </div>`;
      return;
    }

    // Stats rápidas
    const stRow = document.getElementById('statsRow');
    stRow.style.display = 'grid';
    document.getElementById('stPeso').textContent = lista[0].peso ? lista[0].peso + 'kg' : '—';
    document.getElementById('stSemanas').textContent = lista.length;
    const avgEnergia = lista.filter(x => x.energia).reduce((a, b) => a + b.energia, 0) / lista.filter(x => x.energia).length;
    document.getElementById('stEnergia').textContent = isNaN(avgEnergia) ? '—' : '⭐'.repeat(Math.round(avgEnergia));

    blk.innerHTML = `
      <div class="progreso-card">
        <h3>Historial <a href="mi-progreso.html" style="font-size:0.75rem;font-weight:600;color:var(--green);">Ver todo →</a></h3>
        ${lista.slice(0,5).map(p => `
          <div class="historial-item">
            <div class="hist-fecha">${new Date(p.fecha).toLocaleDateString('es-ES',{day:'numeric',month:'short'})}</div>
            <div class="hist-peso">${p.peso ? p.peso+'kg' : '—'}</div>
            <div class="hist-stars">${p.energia ? '⭐'.repeat(p.energia) : ''}</div>
            <div style="flex:1;font-size:0.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.notas || ''}</div>
          </div>`).join('')}
      </div>`;
  } catch {
    blk.innerHTML = `<div class="progreso-card"><p style="color:var(--muted);text-align:center;padding:1rem;">No se pudo cargar el progreso.</p></div>`;
  }
}

init();
</script>
</body>
</html>
