<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi espacio — MomentFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/config.js"></script>
  <script src="../js/mobile-nav.js"></script>
  <script src="../js/auth-guard.js" data-rol="CLIENTE"></script>
</head>
<body>
  <style>
    /* Bienvenida */
    .bienvenida{margin-bottom:1.5rem}
    .bienvenida h1{font-size:1.35rem;font-weight:800;color:var(--text);letter-spacing:-.5px}
    .bienvenida p{color:var(--muted);margin-top:.25rem;font-size:.82rem}

    /* Stats */
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-bottom:1.5rem;background:var(--border-subtle);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);overflow:hidden}
    .stat-mini{background:var(--surface);padding:1.125rem 1rem;text-align:center;transition:background .12s}
    .stat-mini:hover{background:var(--surface-2)}
    .stat-mini .val{font-size:1.65rem;font-weight:900;margin-bottom:.2rem;letter-spacing:-1px;color:var(--text)}
    .stat-mini.c1 .val{color:var(--brand-light)}
    .stat-mini.c2 .val{color:#a78bfa}
    .stat-mini.c3 .val{color:#fbbf24}
    .stat-mini .lbl{font-size:.65rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px}

    /* Section label */
    .sec-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:0 0 .65rem;display:flex;align-items:center;gap:.5rem}
    .sec-label::after{content:"";flex:1;height:1px;background:var(--border-subtle)}

    /* Grid 2 */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem}

    /* Cards */
    .entrenador-card{background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:1.25rem;display:flex;gap:1rem;align-items:center}
    .ent-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;color:#fff;background:var(--brand);overflow:hidden;border:1px solid var(--border)}
    .ent-avatar img{width:100%;height:100%;object-fit:cover}
    .ent-info{flex:1}
    .ent-info h3{font-size:.9rem;font-weight:700;color:var(--text)}
    .ent-info p{color:var(--text-2);font-size:.78rem;margin-top:.1rem}
    .ent-actions{margin-top:.65rem;display:flex;gap:.4rem;flex-wrap:wrap}
    .sin-entrenador{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius-lg);padding:2rem;text-align:center;color:var(--muted)}
    .sin-entrenador p{margin-top:.5rem;font-size:.82rem;line-height:1.6}

    .rutina-preview{background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:1.25rem}
    .rutina-preview h3{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center}
    .ejercicio-row{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border-subtle);font-size:.82rem}
    .ejercicio-row:last-child{border-bottom:none}
    .ej-num{width:22px;height:22px;border-radius:50%;background:var(--surface-3);border:1px solid var(--border);color:var(--text-2);font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ej-info{flex:1}
    .ej-info strong{display:block;font-weight:600;color:var(--text)}
    .ej-info span{color:var(--muted);font-size:.75rem}
    .ej-badge{background:var(--brand-dim);border:1px solid var(--brand-border);color:var(--brand-light);padding:.15rem .5rem;border-radius:3px;font-size:.68rem;font-weight:600;white-space:nowrap}

    .nutricion-card{background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
    .nutricion-card h3{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center}
    .macro-row{display:flex;gap:.5rem;margin-bottom:.875rem;flex-wrap:wrap}
    .macro{flex:1;min-width:60px;text-align:center;background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:.6rem .4rem}
    .macro .mv{font-size:.95rem;font-weight:800;color:var(--text)}
    .macro .ml{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:.15rem}
    .comida-row{padding:.5rem 0;border-bottom:1px solid var(--border-subtle);font-size:.82rem}
    .comida-row:last-child{border-bottom:none}
    .comida-row strong{display:block;font-weight:600;color:var(--text);margin-bottom:.05rem}
    .comida-row span{color:var(--muted);font-size:.75rem}

    .progreso-card{background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:1.25rem}
    .progreso-card h3{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center}
    .historial-item{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border-subtle);font-size:.82rem}
    .historial-item:last-child{border-bottom:none}
    .hist-fecha{width:72px;color:var(--muted);font-size:.72rem;flex-shrink:0}
    .hist-peso{font-weight:800;font-size:.95rem;color:var(--text);width:56px}
    .hist-stars{color:#d97706;font-size:.82rem}
    .mensaje-badge{display:inline-flex;align-items:center;justify-content:center;background:#dc2626;color:#fff;border-radius:99px;font-size:.6rem;font-weight:800;min-width:16px;height:16px;padding:0 3px}

    @media(max-width:768px){
      .main{padding:1rem .85rem 5.5rem}
      .grid-2{grid-template-columns:1fr}
      .grid-3{grid-template-columns:1fr 1fr}
      .entrenador-card{flex-direction:column;align-items:flex-start}
    }
  </style>
<header>
  <div class="container">
    <a href="../index.html" class="logo">Moment<em>Fit</em></a>
    <nav><button onclick="localStorage.clear();location.href='../login.html'">Cerrar sesión</button></nav>
  </div>
</header>

<div class="dashboard-layout">
  <aside class="sidebar">
    <span class="sidebar-label">Mi espacio</span>
    <a href="dashboard.html" class="active">Inicio</a>
    <a href="mi-rutina.html">Mi rutina</a>
    <a href="mi-nutricion.html">Mi nutrición</a>
    <a href="mi-progreso.html">Mi progreso</a>
    <a href="../chat/index.html">Mensajes <span id="badgeNav" style="display:none" class="mensaje-badge"></span></a>
    <span class="sidebar-label">Buscar</span>
    <a href="buscar.html">Buscar entrenador</a>
    <a href="../login.html" onclick="localStorage.clear()">Salir</a>
  </aside>

  <main class="main">
    <div class="page-header" style="margin-bottom:1.25rem">
      <div>
        <h1 id="saludo">Bienvenido</h1>
        <p class="page-subtitle" id="subtitulo">Resumen de tu entrenamiento</p>
      </div>
    </div>

    <div class="grid-3" id="statsRow" style="display:none">
      <div class="stat-mini c1"><div class="val" id="stPeso">—</div><div class="lbl">Ultimo peso (kg)</div></div>
      <div class="stat-mini c2"><div class="val" id="stSemanas">—</div><div class="lbl">Semanas registradas</div></div>
      <div class="stat-mini c3"><div class="val" id="stEnergia">—</div><div class="lbl">Energia media</div></div>
    </div>

    <div class="grid-2">
      <div>
        <p class="sec-label">Mi entrenador</p>
        <div id="entrenadorBlock"></div>
      </div>
      <div id="rutinaSection">
        <p class="sec-label">Rutina actual</p>
        <div id="rutinaBlock"></div>
      </div>
    </div>

    <div id="nutricionSection">
    <p class="sec-label">Plan nutricional</p>
    <div id="nutricionBlock"></div>
    </div>

    <p class="sec-label" style="margin-top:1.25rem">Historial de progreso</p>
    <div id="progresoBlock"></div>
  </main>
</div>

<script>
const token=()=>localStorage.getItem("gc_token");
const h=()=>({Authorization:"Bearer "+token()});

async function init(){
  const u=await fetch(`${API}/api/usuario/perfil`,{headers:h()}).then(r=>r.json()).catch(()=>null);
  if(u){
    document.getElementById("saludo").textContent="Hola, "+u.nombre+" 👋";
    document.getElementById("subtitulo").textContent="Aqui tienes el resumen de tu entrenamiento";
  }
  fetch(`${API}/api/chat/no-leidos`,{headers:h()})
    .then(r=>r.json()).then(d=>{
      const b=document.getElementById("badgeNav");
      if(d.total>0){b.textContent=d.total;b.style.display="inline-flex";}
    }).catch(()=>{});
  cargarEntrenador();
  cargarRutina();
  cargarNutricion();
  cargarProgreso();
}

async function cargarEntrenador(){
  const blk=document.getElementById("entrenadorBlock");
  try{
    const res=await fetch(`${API}/api/entrenadores/mi-entrenador`,{headers:h()});
    if(res.status===204||!res.ok){
      blk.innerHTML=`<div class="sin-entrenador"><span style="font-size:2rem">🏋️</span><p>Aun no tienes entrenador.<br>Busca uno y empieza hoy!</p><a href="buscar.html" class="btn btn-primary" style="margin-top:1rem;font-size:.85rem">Buscar entrenador</a></div>`;
      // Ocultar secciones que dependen del entrenador
      ['rutinaSection','nutricionSection'].forEach(id=>{
        const el=document.getElementById(id); if(el) el.style.display='none';
      });
      return;
    }
    const ent=await res.json();
    const nombre=ent.nombre||"Entrenador";
    const ini=nombre.split(" ").map(n=>n[0]).join("").toUpperCase().slice(0,2);
    const avHtml=ent.fotoUrl
      ?`<div class="ent-avatar"><img src="${ent.fotoUrl}"/></div>`
      :`<div class="ent-avatar" style="background:#16a34a">${ini}</div>`;
    blk.innerHTML=`<div class="entrenador-card">${avHtml}<div class="ent-info"><h3>${nombre}</h3><p>${ent.ciudad||"Entrenador personal"}</p><div style="color:#fbbf24;font-size:.8rem;margin-top:.25rem">${"★".repeat(Math.floor(ent.rating||5))} ${(ent.rating||5).toFixed(1)}</div><div class="ent-actions"><a href="../chat/index.html" class="btn btn-primary" style="font-size:.78rem;padding:.45rem 1rem">💬 Mensaje</a><a href="perfil.html?id=${ent.id}" class="btn btn-outline" style="font-size:.78rem;padding:.45rem 1rem">Ver perfil</a><button onclick="cancelarEntrenador(${ent.id})" class="btn" style="font-size:.78rem;padding:.45rem 1rem;background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.25)">🚫 Cancelar</button></div></div></div>`;
  }catch{blk.innerHTML=`<div class="sin-entrenador">No se pudo cargar</div>`;}
}

async function cancelarEntrenador(entrenadorId) {
  if (!confirm('¿Seguro que quieres cancelar tu suscripción con este entrenador?')) return;
  try {
    const res = await fetch(`${API}/api/entrenadores/${entrenadorId}/cancelar`, {
      method: 'DELETE', headers: h()
    });
    if (res.ok) {
      alert('Relación cancelada. Ya no tienes entrenador asignado.');
      location.reload();
    } else {
      alert('No se pudo cancelar. Inténtalo de nuevo.');
    }
  } catch {
    alert('Error de conexión.');
  }
}

async function cargarRutina(){
  const blk=document.getElementById("rutinaBlock");
  try{
    const res=await fetch(`${API}/api/rutinas/mi-rutina`,{headers:h()});
    if(res.status===204){blk.innerHTML=`<div class="rutina-preview"><p style="color:var(--muted);font-size:.88rem;text-align:center;padding:1rem">Tu entrenador aun no te ha asignado una rutina.</p></div>`;return;}
    const r=await res.json();
    const ejs=r.ejerciciosJson?JSON.parse(r.ejerciciosJson):[];
    const prev=ejs.slice(0,4);
    blk.innerHTML=`<div class="rutina-preview"><h3>${r.titulo} <a href="mi-rutina.html" style="font-size:.75rem;font-weight:600;color:#22c55e">Ver completa →</a></h3>${r.diasSemana?`<p style="font-size:.78rem;color:var(--muted);margin-bottom:.75rem">📅 ${r.diasSemana}</p>`:""} ${prev.map((ej,i)=>`<div class="ejercicio-row"><div class="ej-num">${i+1}</div><div class="ej-info"><strong>${ej.nombre}</strong><span>${ej.series} series · ${ej.reps} reps${ej.descanso?" · "+ej.descanso+" descanso":""}</span></div></div>`).join("")}${ejs.length>4?`<p style="text-align:center;color:var(--muted);font-size:.78rem;padding-top:.75rem">+${ejs.length-4} ejercicios mas</p>`:""}</div>`;
  }catch{blk.innerHTML=`<div class="rutina-preview"><p style="color:var(--muted);text-align:center;padding:1rem">No se pudo cargar la rutina.</p></div>`;}
}

async function cargarNutricion(){
  const blk=document.getElementById("nutricionBlock");
  try{
    const res=await fetch(`${API}/api/nutricion/mi-plan`,{headers:h()});
    if(res.status===204){blk.innerHTML=`<div class="nutricion-card"><p style="color:var(--muted);font-size:.88rem;text-align:center;padding:.5rem">Tu entrenador aun no te ha creado un plan nutricional.</p></div>`;return;}
    const p=await res.json();
    const comidas=p.comidasJson?JSON.parse(p.comidasJson):[];
    blk.innerHTML=`<div class="nutricion-card"><h3>${p.titulo} <a href="mi-nutricion.html" style="font-size:.75rem;font-weight:600;color:#22c55e">Ver completo →</a></h3>${p.caloriasTotal?`<div class="macro-row"><div class="macro"><div class="mv">${p.caloriasTotal}</div><div class="ml">kcal</div></div><div class="macro"><div class="mv">${p.proteinasG||"—"}g</div><div class="ml">Proteína</div></div><div class="macro"><div class="mv">${p.carbohidratosG||"—"}g</div><div class="ml">Carbs</div></div><div class="macro"><div class="mv">${p.grasasG||"—"}g</div><div class="ml">Grasas</div></div></div>`:""} ${comidas.slice(0,3).map(c=>`<div class="comida-row"><strong>${c.nombre}${c.hora?" · "+c.hora:""}</strong><span>${c.alimentos}</span></div>`).join("")}${comidas.length>3?`<p style="text-align:center;color:var(--muted);font-size:.78rem;padding-top:.5rem">+${comidas.length-3} comidas mas</p>`:""}</div>`;
  }catch{blk.innerHTML=`<div class="nutricion-card"><p style="color:var(--muted);text-align:center;padding:.5rem">No se pudo cargar el plan.</p></div>`;}
}

async function cargarProgreso(){
  const blk=document.getElementById("progresoBlock");
  try{
    const lista=await fetch(`${API}/api/progreso/mi-historial`,{headers:h()}).then(r=>r.json());
    if(!lista.length){
      blk.innerHTML=`<div class="progreso-card" style="text-align:center;padding:2rem"><span style="font-size:2rem">📊</span><p style="color:var(--muted);margin:.75rem 0">Aun no has registrado tu progreso.</p><a href="mi-progreso.html" class="btn btn-primary" style="font-size:.85rem">Registrar primer check-in</a></div>`;
      return;
    }
    const stRow=document.getElementById("statsRow");
    stRow.style.display="grid";
    document.getElementById("stPeso").textContent=lista[0].peso?lista[0].peso+"kg":"—";
    document.getElementById("stSemanas").textContent=lista.length;
    const avg=lista.filter(x=>x.energia).reduce((a,b)=>a+b.energia,0)/lista.filter(x=>x.energia).length;
    document.getElementById("stEnergia").textContent=isNaN(avg)?"—":"⭐".repeat(Math.round(avg));
    blk.innerHTML=`<div class="progreso-card"><h3>Historial <a href="mi-progreso.html" style="font-size:.75rem;font-weight:600;color:#22c55e">Ver todo →</a></h3>${lista.slice(0,5).map(p=>`<div class="historial-item"><div class="hist-fecha">${new Date(p.fecha).toLocaleDateString("es-ES",{day:"numeric",month:"short"})}</div><div class="hist-peso">${p.peso?p.peso+"kg":"—"}</div><div class="hist-stars">${p.energia?"⭐".repeat(p.energia):""}</div><div style="flex:1;font-size:.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.notas||""}</div></div>`).join("")}</div>`;
  }catch{blk.innerHTML=`<div class="progreso-card"><p style="color:var(--muted);text-align:center;padding:1rem">No se pudo cargar el progreso.</p></div>`;}
}

init();
</script>
<script src="../js/sidebar-user.js"></script>
</body>
</html>
