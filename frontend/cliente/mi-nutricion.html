<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi nutrición — MomentFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/config.js"></script>
  <script src="../js/mobile-nav.js"></script>
  <script src="../js/auth-guard.js" data-rol="CLIENTE"></script>
  <style>
    .dashboard-layout { display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 70px); }
    
    
    
    
    
    .main { padding:2rem 2.5rem; }
    .macros-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:2rem; }
    .macro-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1rem; text-align:center; }
    .macro-card .val { font-size:1.5rem; font-weight:700; color:var(--brand-light); }
    .macro-card .lbl { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:0.25rem; }
    .macro-card.kcal .val { color:#f59e0b; }
    .macro-card.prot .val { color:#3b82f6; }
    .macro-card.carb .val { color:#8b5cf6; }
    .macro-card.gras .val { color:#ec4899; }
    .comida-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1rem; margin-bottom:0.75rem; }
    .comida-header { display:flex; align-items:center; gap:1rem; margin-bottom:0.75rem; }
    .comida-icon { width:40px; height:40px; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
    .comida-title { font-size:0.9rem; font-weight:600; }
    .comida-hora { font-size:0.78rem; color:var(--muted); }
    .comida-cals { margin-left:auto; font-size:0.8rem; font-weight:500; color:var(--muted); }
    .alimentos-list { font-size:0.88rem; color:var(--text-2); line-height:1.7; padding-left:0.5rem; border-left:2px solid var(--border-subtle); }
    .comida-notas { font-size:0.8rem; color:var(--muted); font-style:italic; margin-top:0.5rem; }
    .sin-plan { text-align:center; padding:4rem 2rem; color:var(--muted); }
    .sin-plan span { font-size:3rem; display:block; margin-bottom:1rem; }
    @media(max-width:768px){
      .macros-bar{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:480px){
      .macros-bar{grid-template-columns:repeat(2,1fr);gap:0.5rem}
      .macro-card .val{font-size:1.1rem}
    }
  </style>
</head>
<body>
<header>
  <div class="container">
    <a href="../index.html" class="logo">Moment<em>Fit</em></a>
    <nav>
      <button onclick="localStorage.clear();location.href='../login.html'">Cerrar sesión</button>
    </nav>
  </div>
</header>

<div class="dashboard-layout">
  <aside class="sidebar">
    <span class="sidebar-label">Mi espacio</span>
    <a href="dashboard.html">Inicio</a>
    <a href="mi-rutina.html">Mi rutina</a>
    <a href="mi-nutricion.html" class="active">Mi nutrición</a>
    <a href="mi-progreso.html">Mi progreso</a>
    <span class="sidebar-label">Buscar</span>
    <a href="buscar.html">Buscar entrenador</a>
    <a href="../login.html" onclick="localStorage.clear()">Salir</a>
  </aside>

  <main class="main">
    <div class="page-header" style="margin-bottom:1.25rem">
      <h1>Mi plan nutricional</h1>
      <p style="color:var(--muted);margin-top:0.3rem;font-size:0.9rem;">El plan de alimentación que ha preparado tu entrenador</p>
    </div>
    <div id="contenido"><p style="color:var(--muted);">Cargando…</p></div>
  </main>
</div>

<script>
const token = () => localStorage.getItem('gc_token');
const h = () => ({ Authorization: 'Bearer ' + token() });

const ICONOS = ['☀️','🌿','🍽️','🌙','🍎','☕'];
const COLORES = ['rgba(245,158,11,0.1)','rgba(34,197,94,0.1)','rgba(59,130,246,0.1)','rgba(139,92,246,0.1)','rgba(236,72,153,0.1)','rgba(20,184,166,0.1)'];

async function cargar() {
  const el = document.getElementById('contenido');
  try {
    const res = await fetch(`${API}/api/nutricion/mi-plan`, { headers: h() });
    if (res.status === 204) {
      el.innerHTML = `<div class="sin-plan"><span>🥗</span><p>Tu entrenador aún no te ha creado un plan nutricional.</p><p style="font-size:0.85rem;margin-top:0.5rem;">Aparecerá aquí cuando lo tenga listo.</p></div>`;
      return;
    }
    const p = await res.json();
    const comidas = p.comidasJson ? JSON.parse(p.comidasJson) : [];

    el.innerHTML = `
      ${p.titulo ? `<h2 style="font-size:1.1rem;font-weight:800;margin-bottom:0.3rem;">${p.titulo}</h2>` : ''}
      ${p.descripcion ? `<p style="color:var(--muted);font-size:0.88rem;margin-bottom:1.5rem;">${p.descripcion}</p>` : ''}

      ${(p.caloriasTotal || p.proteinasG) ? `
      <div class="macros-bar">
        <div class="macro-card kcal"><div class="val">${p.caloriasTotal||'—'}</div><div class="lbl">Calorías</div></div>
        <div class="macro-card prot"><div class="val">${p.proteinasG||'—'}g</div><div class="lbl">Proteína</div></div>
        <div class="macro-card carb"><div class="val">${p.carbohidratosG||'—'}g</div><div class="lbl">Carbs</div></div>
        <div class="macro-card gras"><div class="val">${p.grasasG||'—'}g</div><div class="lbl">Grasas</div></div>
      </div>` : ''}

      ${comidas.map((c, i) => `
        <div class="comida-card">
          <div class="comida-header">
            <div class="comida-icon" style="background:${COLORES[i%COLORES.length]}">${ICONOS[i%ICONOS.length]}</div>
            <div>
              <div class="comida-title">${c.nombre}</div>
              ${c.hora ? `<div class="comida-hora">⏰ ${c.hora}</div>` : ''}
            </div>
            ${c.calorias ? `<div class="comida-cals">${c.calorias} kcal</div>` : ''}
          </div>
          <div class="alimentos-list">${c.alimentos}</div>
          ${c.notas ? `<div class="comida-notas">💡 ${c.notas}</div>` : ''}
        </div>`).join('')}`;
  } catch {
    el.innerHTML = `<p style="color:#dc2626;">Error al cargar el plan.</p>`;
  }
}

cargar();
</script>
<script src="../js/sidebar-user.js"></script>
<script src="../js/chat-widget.js"></script>
</body>
</html>
