<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi progreso — GymConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <script src="../js/config.js"></script>
  <script src="../js/auth-guard.js" data-rol="CLIENTE"></script>
  <style>
    .dashboard-layout { display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 70px); }
    .sidebar { background:var(--dark-hero); border-right:1px solid rgba(255,255,255,0.06); padding:2rem 1rem; display:flex; flex-direction:column; gap:0.25rem; }
    .sidebar-label { font-size:0.65rem; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:var(--muted-light); padding:0 0.75rem; margin:1rem 0 0.4rem; }
    .sidebar a { display:flex; align-items:center; gap:0.6rem; padding:0.65rem 0.75rem; border-radius:8px; font-size:0.85rem; font-weight:600; color:var(--muted-light); transition:background var(--t),color var(--t); text-decoration:none; }
    .sidebar a:hover { background:rgba(255,255,255,0.06); color:var(--text-light); }
    .sidebar a.active { background:rgba(22,163,74,0.15); color:var(--green-l); font-weight:700; }
    .main { padding:2rem 2.5rem; }
    .checkin-form { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.75rem; margin-bottom:2rem; }
    .checkin-form h2 { font-size:1rem; font-weight:800; margin-bottom:1.25rem; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.78rem; font-weight:700; color:var(--muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.5px; }
    .form-group input, .form-group textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.7rem 0.9rem; color:var(--text); font-size:0.9rem; }
    .form-group input:focus, .form-group textarea:focus { outline:none; border-color:var(--green); }
    .energia-row { display:flex; gap:0.5rem; }
    .energia-btn { flex:1; padding:0.6rem; background:var(--bg); border:2px solid var(--border); border-radius:8px; color:var(--muted); font-size:1rem; cursor:pointer; transition:all 0.15s; text-align:center; }
    .energia-btn.sel { border-color:var(--green); background:rgba(22,163,74,0.1); color:var(--green); }
    .historial-lista { display:flex; flex-direction:column; gap:1rem; }
    .checkin-item { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; }
    .checkin-top { display:flex; align-items:center; gap:1.5rem; margin-bottom:0.75rem; flex-wrap:wrap; }
    .checkin-fecha { font-size:0.8rem; color:var(--muted); font-weight:700; }
    .checkin-peso { font-size:1.4rem; font-weight:900; color:var(--text); }
    .checkin-diff { font-size:0.8rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:6px; }
    .diff-up { color:#dc2626; background:rgba(220,38,38,0.1); }
    .diff-down { color:#16a34a; background:rgba(22,163,74,0.1); }
    .checkin-energía { color:#d97706; font-size:1rem; }
    .checkin-notas { font-size:0.85rem; color:var(--text-2); line-height:1.6; }
    .feedback-box { margin-top:0.75rem; padding:0.75rem; background:rgba(22,163,74,0.05); border:1px solid rgba(22,163,74,0.15); border-radius:8px; font-size:0.83rem; color:var(--text-2); }
    .feedback-box strong { display:block; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--green); margin-bottom:0.3rem; }
    .foto-preview { width:80px; height:80px; border-radius:8px; object-fit:cover; margin-left:auto; }
    .cumpl-bar { height:6px; background:var(--border); border-radius:99px; margin-top:0.5rem; overflow:hidden; }
    .cumpl-fill { height:100%; background:var(--grad-main); border-radius:99px; }
    @media(max-width:768px){ .dashboard-layout{grid-template-columns:1fr} .sidebar{display:none} .main{padding:1.25rem} .form-row{grid-template-columns:1fr} }
  </style>
</head>
<body>
<header>
  <div class="container">
    <a href="../index.html" class="logo">Gym<span>Connect</span></a>
    <nav>
      <button class="btn btn-outline" style="font-size:0.82rem;" onclick="localStorage.clear();location.href='../login.html'">Cerrar sesión</button>
    </nav>
  </div>
</header>

<div class="dashboard-layout">
  <aside class="sidebar">
    <span class="sidebar-label">Mi espacio</span>
    <a href="dashboard.html">🏠 Inicio</a>
    <a href="mi-rutina.html">💪 Mi rutina</a>
    <a href="mi-nutricion.html">🥗 Mi nutrición</a>
    <a href="mi-progreso.html" class="active">📈 Mi progreso</a>
    <a href="../chat/index.html">💬 Mensajes</a>
    <span class="sidebar-label">Buscar</span>
    <a href="buscar.html">🔍 Buscar entrenador</a>
    <a href="../login.html" onclick="localStorage.clear()">🚪 Salir</a>
  </aside>

  <main class="main">
    <div style="margin-bottom:1.75rem;">
      <h1 style="font-size:1.5rem;font-weight:800;">📈 Mi progreso</h1>
      <p style="color:var(--muted);margin-top:0.3rem;font-size:0.9rem;">Registra tu check-in semanal y sigue tu evolución</p>
    </div>

    <!-- Formulario check-in -->
    <div class="checkin-form">
      <h2>✍️ Nuevo check-in</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Peso (kg)</label>
          <input type="number" id="peso" placeholder="70.5" step="0.1" />
        </div>
        <div class="form-group">
          <label>Grasa corporal (%)</label>
          <input type="number" id="grasa" placeholder="18" step="0.1" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Musculatura (kg, opcional)</label>
          <input type="number" id="musculatura" placeholder="55" step="0.1" />
        </div>
        <div class="form-group">
          <label>Cumplimiento de rutina (%)</label>
          <input type="number" id="cumplimiento" placeholder="80" min="0" max="100" />
        </div>
      </div>
      <div class="form-group" style="margin-bottom:1rem;">
        <label>¿Cómo te has sentido esta semana?</label>
        <div class="energia-row">
          <button class="energia-btn" data-v="1" onclick="selEnergia(1)">😴 Bajo</button>
          <button class="energia-btn" data-v="2" onclick="selEnergia(2)">😐 Regular</button>
          <button class="energia-btn" data-v="3" onclick="selEnergia(3)">🙂 Bien</button>
          <button class="energia-btn" data-v="4" onclick="selEnergia(4)">😄 Muy bien</button>
          <button class="energia-btn" data-v="5" onclick="selEnergia(5)">🔥 Increíble</button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:1rem;">
        <label>Notas para tu entrenador</label>
        <textarea id="notas" rows="3" placeholder="¿Cómo ha ido la semana? ¿Algo que destacar?"></textarea>
      </div>
      <input type="hidden" id="fotoUrl" />
      <button class="btn btn-primary" onclick="guardar()" style="width:100%;">Guardar check-in</button>
      <div id="msg" style="margin-top:0.75rem;font-size:0.85rem;text-align:center;display:none;"></div>
    </div>

    <!-- Historial -->
    <h2 style="font-size:1rem;font-weight:800;margin-bottom:1rem;">Historial de check-ins</h2>
    <div class="historial-lista" id="historial"><p style="color:var(--muted);">Cargando…</p></div>
  </main>
</div>

<script>
const token = () => localStorage.getItem('gc_token');
const h = () => ({ Authorization: 'Bearer ' + token(), 'Content-Type': 'application/json' });
let energiaVal = 0;

function selEnergia(v) {
  energiaVal = v;
  document.querySelectorAll('.energia-btn').forEach(b => {
    b.classList.toggle('sel', parseInt(b.dataset.v) === v);
  });
}

async function subirFoto(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const fd = new FormData();
    fd.append('image', file);
    const res = await fetch(`${API}/api/upload/imagen`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('gc_token') },
      body: fd
    });
    const r = await res.json();
    if (!res.ok) throw new Error();
    document.getElementById('fotoUrl').value = r.url;
  } catch { showMsg('Error al subir la foto.', true); }
}

function showMsg(txt, err) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.style.color = err ? '#dc2626' : 'var(--green)';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

async function guardar() {
  const body = {
    peso: parseFloat(document.getElementById('peso').value) || null,
    grasaCorporal: parseFloat(document.getElementById('grasa').value) || null,
    musculatura: parseFloat(document.getElementById('musculatura').value) || null,
    cumplimiento: parseInt(document.getElementById('cumplimiento').value) || null,
    notas: document.getElementById('notas').value || null,
    fotoUrl: document.getElementById('fotoUrl').value || null,
    energia: energiaVal || null
  };
  try {
    const r = await fetch(`${API}/api/progreso/check-in`, { method:'POST', headers: h(), body: JSON.stringify(body) });
    if (!r.ok) { const t = await r.text(); throw new Error(t); }
    showMsg('✓ Check-in guardado. ¡Sigue así!');
    // Limpiar form
    ['peso','grasa','musculatura','cumplimiento','notas','fotoUrl'].forEach(id => document.getElementById(id).value = '');
    energiaVal = 0;
    document.querySelectorAll('.energia-btn').forEach(b => b.classList.remove('sel'));
    cargarHistorial();
  } catch (e) {
    showMsg(e.message || 'Error al guardar.', true);
  }
}

async function cargarHistorial() {
  const el = document.getElementById('historial');
  try {
    const lista = await fetch(`${API}/api/progreso/mi-historial`, { headers: { Authorization: 'Bearer ' + token() } }).then(r => r.json());
    if (!lista.length) { el.innerHTML = `<p style="color:var(--muted);">Aún no tienes check-ins registrados.</p>`; return; }
    el.innerHTML = lista.map((p, i) => {
      const prev = lista[i+1];
      let diffHtml = '';
      if (prev && p.peso && prev.peso) {
        const diff = (p.peso - prev.peso).toFixed(1);
        if (diff !== '0.0') diffHtml = `<span class="checkin-diff ${diff > 0 ? 'diff-up' : 'diff-down'}">${diff > 0 ? '+':' '}${diff}kg</span>`;
      }
      return `
        <div class="checkin-item">
          <div class="checkin-top">
            <div class="checkin-fecha">${new Date(p.fecha).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
            ${p.peso ? `<div class="checkin-peso">${p.peso}kg ${diffHtml}</div>` : ''}
            ${p.energia ? `<div class="checkin-energía">${'⭐'.repeat(p.energia)}</div>` : ''}
            ${p.fotoUrl ? `<img src="${p.fotoUrl}" class="foto-preview" />` : ''}
          </div>
          ${p.cumplimiento != null ? `<div style="font-size:0.78rem;color:var(--muted);margin-bottom:0.25rem;">Cumplimiento: ${p.cumplimiento}%</div><div class="cumpl-bar"><div class="cumpl-fill" style="width:${p.cumplimiento}%"></div></div>` : ''}
          ${p.notas ? `<p class="checkin-notas" style="margin-top:0.75rem;">${p.notas}</p>` : ''}
          ${p.notasEntrenador ? `<div class="feedback-box"><strong>💬 Feedback del entrenador</strong>${p.notasEntrenador}</div>` : ''}
        </div>`;
    }).join('');
  } catch { el.innerHTML = `<p style="color:#dc2626;">Error al cargar historial.</p>`; }
}

cargarHistorial();
</script>
</body>
</html>
