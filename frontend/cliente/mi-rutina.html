<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi rutina — MomentFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/config.js"></script>
  <script src="../js/mobile-nav.js"></script>
  <script src="../js/auth-guard.js" data-rol="CLIENTE"></script>
  <style>
    .dashboard-layout { display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 70px); }
    
    
    
    
    
    .main { padding:2rem 2.5rem; }
    .page-header { margin-bottom:2rem; }
    .page-header h1 { font-size:1.3rem; font-weight:700; }
    .page-header p { color:var(--muted); margin-top:0.3rem; font-size:0.9rem; }
    .rutina-meta { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .meta-chip { display:inline-flex; align-items:center; gap:0.4rem; padding:0.35rem 0.85rem; background:var(--surface); border:1px solid var(--border); border-radius:99px; font-size:0.8rem; font-weight:500; color:var(--text-2); }
    .ejercicios-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; }
    .ejercicio-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1rem; }
    .ej-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.75rem; }
    .ej-num { width:32px; height:32px; border-radius:50%; background:rgba(22,163,74,0.12); border:2px solid rgba(22,163,74,0.3); color:var(--green); font-size:0.8rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .ej-nombre { font-size:0.92rem; font-weight:600; color:var(--text); }
    .ej-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem; margin-bottom:0.6rem; }
    .ej-stat { background:var(--bg); border-radius:var(--radius); padding:0.4rem; text-align:center; }
    .ej-stat .v { font-size:0.9rem; font-weight:700; color:var(--text); }
    .ej-stat .l { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:0.1rem; }
    .ej-notas { font-size:0.8rem; color:var(--muted); font-style:italic; border-left:2px solid rgba(22,163,74,0.3); padding-left:0.6rem; margin-top:0.5rem; }
    .sin-rutina { text-align:center; padding:4rem 2rem; color:var(--muted); }
    .sin-rutina span { font-size:3rem; display:block; margin-bottom:1rem; }
    @media(max-width:768px){
      .ejercicios-grid { grid-template-columns:1fr; }
      .page-header h1 { font-size:1.05rem; }
    }
    @media(max-width:480px){
      .ejercicios-grid { grid-template-columns:1fr; gap:0.75rem; }
      .ej-stats { grid-template-columns:repeat(3,1fr); gap:0.35rem; }
      .ej-stat .v { font-size:0.82rem; }
      .rutina-meta { gap:0.5rem; }
      .meta-chip { font-size:0.74rem; padding:0.28rem 0.65rem; }
      .sin-rutina { padding:2.5rem 1rem; }
      .sin-rutina span { font-size:2rem; }
    }
  </style>
</head>
<body>
<header>
  <div class="container">
    <a href="../index.html" class="logo">Moment<em>Fit</em></a>
    <nav>
      <button onclick="localStorage.clear();location.href='../login.html'">Cerrar sesión</button>
    </nav>
  </div>
</header>

<div class="dashboard-layout">
  <aside class="sidebar">
    <span class="sidebar-label">Mi espacio</span>
    <a href="dashboard.html">Inicio</a>
    <a href="mi-rutina.html" class="active">Mi rutina</a>
    <a href="mi-nutricion.html">Mi nutrición</a>
    <a href="mi-progreso.html">Mi progreso</a>
    <a href="#" onclick="openChatWidget();return false;">Mensajes</a>
    <span class="sidebar-label">Buscar</span>
    <a href="buscar.html">Buscar entrenador</a>
    <a href="../login.html" onclick="localStorage.clear()">Salir</a>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1>Mi rutina</h1>
      <p>La rutina que tu entrenador ha preparado para ti</p>
    </div>
    <div id="contenido"><p style="color:var(--muted);">Cargando…</p></div>
  </main>
</div>

<script>
const token = () => localStorage.getItem('gc_token');
const h = () => ({ Authorization: 'Bearer ' + token() });

async function cargar() {
  const el = document.getElementById('contenido');
  try {
    const res = await fetch(`${API}/api/rutinas/mi-rutina`, { headers: h() });
    if (res.status === 204) {
      el.innerHTML = `<div class="sin-rutina"><span>💪</span><p>Tu entrenador aún no te ha asignado una rutina.</p><p style="font-size:0.85rem;margin-top:0.5rem;">Cuando cree una para ti, aparecerá aquí.</p></div>`;
      return;
    }
    const r = await res.json();
    const ejercicios = r.ejerciciosJson ? JSON.parse(r.ejerciciosJson) : [];

    el.innerHTML = `
      <div class="rutina-meta">
        ${r.diasSemana ? `<span class="meta-chip">📅 ${r.diasSemana}</span>` : ''}
        ${r.nivel ? `<span class="meta-chip">🎯 ${r.nivel}</span>` : ''}
        ${r.duracionMinutos ? `<span class="meta-chip">⏱ ${r.duracionMinutos} min</span>` : ''}
        <span class="meta-chip">🏋️ ${ejercicios.length} ejercicios</span>
      </div>

      ${r.descripcion ? `<div class="card" style="margin-bottom:1.5rem;font-size:0.9rem;color:var(--text-2);line-height:1.7;">${r.descripcion}</div>` : ''}

      <div class="ejercicios-grid">
        ${ejercicios.map((ej, i) => `
          <div class="ejercicio-card">
            <div class="ej-header">
              <div class="ej-num">${i+1}</div>
              <div class="ej-nombre">${ej.nombre}</div>
            </div>
            <div class="ej-stats">
              <div class="ej-stat"><div class="v">${ej.series||'—'}</div><div class="l">Series</div></div>
              <div class="ej-stat"><div class="v">${ej.reps||'—'}</div><div class="l">Reps</div></div>
              <div class="ej-stat"><div class="v">${ej.descanso||'—'}</div><div class="l">Descanso</div></div>
            </div>
            ${ej.notas ? `<div class="ej-notas">${ej.notas}</div>` : ''}
          </div>`).join('')}
      </div>`;
  } catch {
    el.innerHTML = `<p style="color:#dc2626;">Error al cargar la rutina.</p>`;
  }
}

cargar();
</script>
<script src="../js/sidebar-user.js"></script>
<script src="../js/chat-widget.js"></script>
</body>
</html>
