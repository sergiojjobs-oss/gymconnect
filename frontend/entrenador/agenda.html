<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda — MomentFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/config.js"></script>
  <script src="../js/mobile-nav.js"></script>
  <script src="../js/plan-theme.js"></script>
  <script src="../js/auth-guard.js" data-rol="ENTRENADOR"></script>
  <style>
    
    
    
    
    
    
    

    .semana-nav { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; }
    .semana-nav button { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:0.4rem 0.85rem; color:var(--text); cursor:pointer; font-weight:700; font-size:0.82rem; }
    .semana-nav button:hover { border-color:var(--brand); }
    .semana-titulo { font-size:1rem; font-weight:600; color:var(--text); }

    .calendario { display:grid; grid-template-columns:repeat(7,1fr); gap:0.5rem; }
    .dia-col { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; min-height:220px; }
    .dia-header { padding:0.6rem 0.75rem; border-bottom:1px solid var(--border); text-align:center; }
    .dia-nombre { font-size:0.65rem; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); }
    .dia-num { font-size:1.1rem; font-weight:700; color:var(--text); }
    .dia-header.hoy { background:rgba(22,163,74,0.08); border-bottom-color:rgba(22,163,74,0.2); }
    .dia-header.hoy .dia-num { color:var(--green); }
    .dia-body { padding:0.5rem; display:flex; flex-direction:column; gap:0.4rem; }

    .sesion-pill { border-radius:8px; padding:0.4rem 0.6rem; font-size:0.72rem; cursor:pointer; transition:opacity 0.15s; position:relative; }
    .sesion-pill:hover { opacity:0.85; }
    .sesion-pill .sp-hora { font-weight:600; }
    .sesion-pill .sp-cliente { font-weight:600; opacity:0.85; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sp-tipo-fuerza { background:rgba(99,102,241,0.18); border:1px solid rgba(99,102,241,0.3); color:#818cf8; }
    .sp-tipo-cardio { background:rgba(239,68,68,0.14); border:1px solid rgba(239,68,68,0.25); color:#f87171; }
    .sp-tipo-flexibilidad { background:rgba(16,185,129,0.14); border:1px solid rgba(16,185,129,0.25); color:#34d399; }
    .sp-tipo-evaluacion { background:rgba(245,158,11,0.14); border:1px solid rgba(245,158,11,0.25); color:#fbbf24; }
    .sp-tipo-otro { background:rgba(107,114,128,0.14); border:1px solid rgba(107,114,128,0.25); color:#9ca3af; }
    .sp-estado-completada { opacity:0.5; }
    .sp-estado-cancelada { opacity:0.35; text-decoration:line-through; }
    .btn-add-dia { width:100%; background:transparent; border:1px dashed var(--border); border-radius:6px; padding:0.3rem; color:var(--muted); font-size:0.75rem; cursor:pointer; margin-top:0.2rem; }
    .btn-add-dia:hover { border-color:var(--brand); color:var(--brand); }

    /* Modal */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; padding:1rem; }
    .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2rem; width:100%; max-width:480px; }
    .modal-box h3 { font-size:1.1rem; font-weight:600; margin-bottom:1.25rem; }
    .form-row { margin-bottom:1rem; }
    .form-row label { display:block; font-size:0.78rem; font-weight:500; color:var(--text-2); margin-bottom:0.3rem; }
    .form-row input, .form-row select, .form-row textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.6rem 0.75rem; color:var(--text); font-size:0.88rem; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline:none; border-color:var(--brand); }
    .form-row select option { background:#ffffff; color:#111827; }
    .modal-btns { display:flex; gap:0.75rem; margin-top:1.5rem; }
    .btn-danger { background:rgba(220,38,38,0.1); border:1px solid rgba(220,38,38,0.3); color:#f87171; border-radius:8px; padding:0.6rem 1.25rem; font-weight:700; cursor:pointer; font-size:0.85rem; }
    .btn-danger:hover { background:rgba(220,38,38,0.2); }

    /* ── Selector de día (móvil) ── */
    .dias-strip {
      display: none;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; gap: 0.4rem;
      padding-bottom: 0.25rem; margin-bottom: 1rem;
    }
    .dias-strip::-webkit-scrollbar { display: none; }
    .dia-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.1rem; min-width: 44px; padding: 0.45rem 0.6rem;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: var(--surface); cursor: pointer; flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .dia-btn .db-nombre { font-size: 0.58rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .dia-btn .db-num   { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1; }
    .dia-btn .db-dot   { width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin-top: 2px; opacity: 0; }
    .dia-btn.tiene-sesiones .db-dot { opacity: 1; }
    .dia-btn.hoy { border-color: rgba(22,163,74,0.35); }
    .dia-btn.hoy .db-num { color: var(--green); }
    .dia-btn.activo { background: rgba(22,163,74,0.12); border-color: var(--brand); }
    .dia-btn.activo .db-num { color: var(--green); }

    /* ── Vista lista (móvil) ── */
    .lista-dia { display: none; flex-direction: column; gap: 0.6rem; }
    .lista-dia-titulo { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 0.25rem; }
    .sesion-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 0.9rem 1rem; display: flex; align-items: center; gap: 0.85rem;
      cursor: pointer; transition: border-color 0.15s;
    }
    .sesion-card:hover { border-color: var(--brand); }
    .sesion-card-hora { font-size: 0.8rem; font-weight: 600; color: var(--text); min-width: 36px; }
    .sesion-card-info { flex: 1; min-width: 0; }
    .sesion-card-cliente { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .sesion-card-tipo { font-size: 0.73rem; color: var(--muted); margin-top: 0.1rem; }
    .sesion-card-badge { font-size: 0.65rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 99px; flex-shrink: 0; }
    .sin-sesiones-dia { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.85rem; }

    @media(max-width:900px){ .calendario{grid-template-columns:repeat(7,minmax(110px,1fr)); overflow-x:auto; -webkit-overflow-scrolling:touch;} }
    @media(max-width:768px){
      /* Ocultar vista semanal, mostrar lista */
      .semana-nav { gap: 0.4rem; flex-wrap: wrap; }
      .semana-nav button { padding: 0.35rem 0.6rem; font-size: 0.78rem; min-height: 38px; }
      .semana-titulo { font-size: 0.82rem; text-align: center; flex: 1; min-width: 0; }
      .calendario { display: none !important; }
      .dias-strip  { display: flex; }
      .lista-dia   { display: flex; }
      .sesion-card { padding: 0.75rem 0.875rem; }
    }
    @media(max-width:480px){
      .semana-nav { gap: 0.3rem; }
      .semana-nav button { padding: 0.3rem 0.5rem; font-size: 0.75rem; }
      .sesion-card { gap: 0.6rem; }
      .sesion-card-cliente { font-size: 0.82rem; }
      .dias-strip { gap: 0.3rem; }
      .dia-btn { min-width: 40px; padding: 0.4rem 0.5rem; }
    }
  </style>
</head>
<body>
<header>
  <div class="container">
    <a href="../index.html" class="logo">Moment<em>Fit</em></a>
    <nav>
      <button onclick="localStorage.clear();location.href='../login.html'">Cerrar sesión</button>
    </nav>
  </div>
</header>

<div class="dashboard-layout">
  <aside class="sidebar">
    <span class="sidebar-label">Panel</span>
    <a href="perfil.html">Mi perfil</a>
    <a href="rutinas.html">Rutinas</a>
    <a href="nutricion.html">Nutrición</a>
    <a href="clientes.html">Clientes</a>
    <a href="ficha-cliente.html">Fichas de clientes</a>
    <a href="agenda.html" class="active">Agenda</a>
    <a href="ejercicios.html">Ejercicios</a>
    <a href="resultados.html">Progreso clientes</a>
    <a href="estadisticas.html">Estadísticas</a>
    <span class="sidebar-label">Cuenta</span>
    <a href="planes.html">Mi suscripción</a>
    <a href="ajustes.html">Ajustes</a>
    <a href="../login.html" onclick="localStorage.clear()">Salir</a>
  </aside>

  <main class="main">
    <div style="margin-bottom:1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
      <div>
        <h1>Agenda</h1>
        <p class="page-subtitle">Programa y gestiona tus sesiones con clientes</p>
      </div>
      <button class="btn btn-primary" onclick="abrirModalNueva(null)">+ Nueva sesión</button>
    </div>

    <div class="semana-nav">
      <button onclick="cambiarSemana(-1)">&#8249; Anterior</button>
      <span class="semana-titulo" id="tituloSemana"></span>
      <button onclick="cambiarSemana(1)">Siguiente &#8250;</button>
      <button onclick="irHoy()" style="margin-left:auto;">Hoy</button>
    </div>

    <!-- Selector de días (solo móvil) -->
    <div class="dias-strip" id="diasStrip"></div>

    <!-- Lista del día seleccionado (solo móvil) -->
    <div class="lista-dia" id="listaDia"></div>

    <!-- Grid semanal (desktop) -->
    <div class="calendario" id="calendario"></div>
  </main>
</div>

<!-- Modal nueva/editar sesión -->
<div class="modal-bg" id="modalSesion" style="display:none;">
  <div class="modal-box">
    <h3 id="modalTitulo">Nueva sesión</h3>
    <div class="form-row">
      <label>Cliente</label>
      <select id="sCliente"></select>
    </div>
    <div class="form-row">
      <label>Fecha</label>
      <input type="date" id="sFecha" />
    </div>
    <div class="form-row">
      <label>Hora</label>
      <input type="time" id="sHora" value="09:00" />
    </div>
    <div class="form-row">
      <label>Duración (min)</label>
      <input type="number" id="sDuracion" value="60" min="15" max="240" />
    </div>
    <div class="form-row">
      <label>Tipo</label>
      <select id="sTipo">
        <option value="Fuerza">Fuerza / Musculación</option>
        <option value="Hipertrofia">Hipertrofia</option>
        <option value="Powerlifting">Powerlifting</option>
        <option value="Cardio">Cardio de gimnasio</option>
        <option value="HIIT">HIIT en sala</option>
        <option value="Core">Core y abdomen</option>
        <option value="Movilidad">Movilidad y estiramientos</option>
        <option value="Evaluacion">Evaluación inicial</option>
        <option value="Otro">Otro</option>
      </select>
    </div>
    <div class="form-row" id="rowEstado" style="display:none;">
      <label>Estado</label>
      <select id="sEstado">
        <option value="PROGRAMADA">Programada</option>
        <option value="COMPLETADA">Completada</option>
        <option value="CANCELADA">Cancelada</option>
      </select>
    </div>
    <div class="form-row">
      <label>Notas</label>
      <textarea id="sNotas" rows="2" placeholder="Notas opcionales…"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" style="flex:1;" onclick="guardarSesion()">Guardar</button>
      <button id="btnEliminar" class="btn-danger" style="display:none;" onclick="eliminarSesion()">Eliminar</button>
      <button class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const token = () => localStorage.getItem('gc_token');
const hdr = (json) => ({ Authorization: 'Bearer ' + token(), ...(json ? {'Content-Type':'application/json'} : {}) });

const DIAS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let fechaBase = lunes(new Date());
let clientes = [];
let sesionesActuales = [];
let sesionEditId = null;

function lunes(d) {
  const c = new Date(d);
  const dia = c.getDay() === 0 ? 6 : c.getDay() - 1;
  c.setDate(c.getDate() - dia);
  c.setHours(0,0,0,0);
  return c;
}

function fmt(d) { return d.toISOString().split('T')[0]; }

function cambiarSemana(dir) { fechaBase.setDate(fechaBase.getDate() + dir * 7); cargar(); }
function irHoy() { fechaBase = lunes(new Date()); cargar(); }

async function cargar() {
  const fin = new Date(fechaBase); fin.setDate(fin.getDate() + 6);
  const r = await fetch(`${API}/api/sesiones/semana?desde=${fmt(fechaBase)}&hasta=${fmt(fin)}`, { headers: hdr() });
  sesionesActuales = r.ok ? await r.json() : [];
  renderCalendario();
}

async function cargarClientes() {
  const r = await fetch(`${API}/api/chat/contactos`, { headers: hdr() });
  if (r.ok) {
    const data = await r.json();
    clientes = data.filter(c => c.esPagador);
    const sel = document.getElementById('sCliente');
    sel.innerHTML = clientes.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
  }
}

let diaSeleccionado = fmt(new Date());

function tipoBadgeClass(tipo) {
  const t = (tipo || 'otro').toLowerCase().replace(/ó/g,'o').replace(/é/g,'e').replace(/á/g,'a');
  const map = { fuerza:'#818cf8;background:rgba(99,102,241,0.18);border:1px solid rgba(99,102,241,0.3)',
    cardio:'#f87171;background:rgba(239,68,68,0.14);border:1px solid rgba(239,68,68,0.25)',
    flexibilidad:'#34d399;background:rgba(16,185,129,0.14);border:1px solid rgba(16,185,129,0.25)',
    evaluacion:'#fbbf24;background:rgba(245,158,11,0.14);border:1px solid rgba(245,158,11,0.25)',
    otro:'#9ca3af;background:rgba(107,114,128,0.14);border:1px solid rgba(107,114,128,0.25)' };
  return map[t] || map.otro;
}

function renderCalendario() {
  const hoy = fmt(new Date());
  const fin = new Date(fechaBase); fin.setDate(fin.getDate() + 6);
  document.getElementById('tituloSemana').textContent =
    `${fechaBase.getDate()} ${MESES[fechaBase.getMonth()]} — ${fin.getDate()} ${MESES[fin.getMonth()]} ${fin.getFullYear()}`;

  // ── Desktop: grid semanal ──
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(fechaBase); d.setDate(d.getDate() + i);
    const ds = fmt(d);
    const esHoy = ds === hoy;
    const sesiones = sesionesActuales.filter(s => s.fecha === ds);

    html += `<div class="dia-col">
      <div class="dia-header${esHoy ? ' hoy' : ''}">
        <div class="dia-nombre">${DIAS[i]}</div>
        <div class="dia-num">${d.getDate()}</div>
      </div>
      <div class="dia-body">`;

    sesiones.forEach(s => {
      const tipo = (s.tipo || 'otro').toLowerCase().replace(/ó/g,'o').replace(/é/g,'e');
      const estadoClass = s.estado === 'COMPLETADA' ? 'sp-estado-completada' : s.estado === 'CANCELADA' ? 'sp-estado-cancelada' : '';
      const nombreCliente = s.cliente ? `${s.cliente.nombre || ''} ${s.cliente.apellido || ''}`.trim() : clientes.find(c => c.id == s.cliente?.id)?.nombre || '—';
      html += `<div class="sesion-pill sp-tipo-${tipo} ${estadoClass}" onclick="editarSesion(${JSON.stringify(s).replace(/"/g,'&quot;')})">
        <div class="sp-hora">${s.hora ? s.hora.substring(0,5) : ''}</div>
        <div class="sp-cliente">${nombreCliente}</div>
        <div style="font-size:0.65rem;opacity:0.7;">${s.tipo || ''}</div>
      </div>`;
    });

    html += `<button class="btn-add-dia" onclick="abrirModalNueva('${ds}')">+ añadir</button>
      </div>
    </div>`;
  }
  document.getElementById('calendario').innerHTML = html;

  // ── Móvil: strip de días ──
  let stripHtml = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(fechaBase); d.setDate(d.getDate() + i);
    const ds = fmt(d);
    const esHoy = ds === hoy;
    const tieneSesiones = sesionesActuales.some(s => s.fecha === ds);
    const activo = ds === diaSeleccionado;
    stripHtml += `<button class="dia-btn${esHoy ? ' hoy' : ''}${activo ? ' activo' : ''}${tieneSesiones ? ' tiene-sesiones' : ''}"
      onclick="seleccionarDia('${ds}')">
      <span class="db-nombre">${DIAS[i]}</span>
      <span class="db-num">${d.getDate()}</span>
      <span class="db-dot"></span>
    </button>`;
  }
  document.getElementById('diasStrip').innerHTML = stripHtml;

  renderListaDia();
}

function seleccionarDia(ds) {
  diaSeleccionado = ds;
  document.querySelectorAll('.dia-btn').forEach(btn => {
    btn.classList.toggle('activo', btn.getAttribute('onclick').includes(`'${ds}'`));
  });
  renderListaDia();
}

function renderListaDia() {
  const sesiones = sesionesActuales.filter(s => s.fecha === diaSeleccionado).sort((a,b) => (a.hora||'').localeCompare(b.hora||''));
  const d = new Date(diaSeleccionado + 'T12:00:00');
  const titulo = `${DIAS[(d.getDay()+6)%7]} ${d.getDate()} de ${MESES[d.getMonth()]}`;

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem;">
    <span class="lista-dia-titulo">${titulo}</span>
    <button class="btn btn-primary" style="font-size:0.78rem;padding:0.4rem 0.85rem;" onclick="abrirModalNueva('${diaSeleccionado}')">+ Añadir</button>
  </div>`;

  if (!sesiones.length) {
    html += `<div class="sin-sesiones-dia">Sin sesiones este día</div>`;
  } else {
    sesiones.forEach(s => {
      const nombreCliente = s.cliente ? `${s.cliente.nombre || ''} ${s.cliente.apellido || ''}`.trim() : clientes.find(c => c.id == s.cliente?.id)?.nombre || '—';
      const badgeStyle = tipoBadgeClass(s.tipo);
      const opacidad = s.estado === 'COMPLETADA' ? 'opacity:0.55;' : s.estado === 'CANCELADA' ? 'opacity:0.35;text-decoration:line-through;' : '';
      html += `<div class="sesion-card" style="${opacidad}" onclick="editarSesion(${JSON.stringify(s).replace(/"/g,'&quot;')})">
        <div class="sesion-card-hora">${s.hora ? s.hora.substring(0,5) : '—'}</div>
        <div class="sesion-card-info">
          <div class="sesion-card-cliente">${nombreCliente}</div>
          <div class="sesion-card-tipo">${s.tipo || ''} · ${s.duracionMinutos || 60} min</div>
        </div>
        <span class="sesion-card-badge" style="color:${badgeStyle}">${s.tipo || 'Otro'}</span>
      </div>`;
    });
  }
  document.getElementById('listaDia').innerHTML = html;
}

function abrirModalNueva(fecha) {
  sesionEditId = null;
  document.getElementById('modalTitulo').textContent = 'Nueva sesión';
  document.getElementById('sFecha').value = fecha || fmt(new Date());
  document.getElementById('sHora').value = '09:00';
  document.getElementById('sDuracion').value = '60';
  document.getElementById('sTipo').value = 'Fuerza';
  document.getElementById('sNotas').value = '';
  document.getElementById('rowEstado').style.display = 'none';
  document.getElementById('btnEliminar').style.display = 'none';
  document.getElementById('modalSesion').style.display = 'flex';
}

function editarSesion(s) {
  sesionEditId = s.id;
  document.getElementById('modalTitulo').textContent = 'Editar sesión';
  document.getElementById('sFecha').value = s.fecha;
  document.getElementById('sHora').value = s.hora ? s.hora.substring(0,5) : '09:00';
  document.getElementById('sDuracion').value = s.duracionMinutos || 60;
  document.getElementById('sTipo').value = s.tipo || 'Fuerza';
  document.getElementById('sNotas').value = s.notas || '';
  document.getElementById('sEstado').value = s.estado || 'PROGRAMADA';
  document.getElementById('rowEstado').style.display = 'block';
  document.getElementById('btnEliminar').style.display = 'block';
  // Seleccionar cliente
  if (s.cliente?.id) document.getElementById('sCliente').value = s.cliente.id;
  document.getElementById('modalSesion').style.display = 'flex';
}

function cerrarModal() { document.getElementById('modalSesion').style.display = 'none'; }

async function guardarSesion() {
  const body = {
    clienteId: parseInt(document.getElementById('sCliente').value),
    fecha: document.getElementById('sFecha').value,
    hora: document.getElementById('sHora').value,
    duracionMinutos: parseInt(document.getElementById('sDuracion').value),
    tipo: document.getElementById('sTipo').value,
    notas: document.getElementById('sNotas').value,
  };
  if (sesionEditId) body.estado = document.getElementById('sEstado').value;

  const url = sesionEditId ? `${API}/api/sesiones/${sesionEditId}` : `${API}/api/sesiones`;
  const method = sesionEditId ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers: hdr(true), body: JSON.stringify(body) });
  if (r.ok) { cerrarModal(); cargar(); }
  else alert('Error al guardar la sesión');
}

async function eliminarSesion() {
  if (!confirm('¿Eliminar esta sesión?')) return;
  const r = await fetch(`${API}/api/sesiones/${sesionEditId}`, { method: 'DELETE', headers: hdr() });
  if (r.ok) { cerrarModal(); cargar(); }
}

cargarClientes().then(() => cargar());
</script>
