<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis clientes — GymConnect</title>
  <link rel="stylesheet" href="../css/main.css" />
  <script src="../js/config.js"></script>
  <script src="../js/auth-guard.js" data-rol="ENTRENADOR"></script>
  <style>
    .dashboard-layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 70px); }
    .sidebar { background:var(--dark-hero); border-right:1px solid rgba(255,255,255,0.06); padding:2rem 1rem; display:flex; flex-direction:column; gap:0.25rem; }
    .sidebar-label { font-size:0.65rem; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:var(--muted-light); padding:0 0.75rem; margin:1rem 0 0.4rem; }
    .sidebar a { display:flex; align-items:center; gap:0.6rem; padding:0.65rem 0.75rem; border-radius:8px; font-size:0.85rem; font-weight:600; color:var(--muted-light); transition:background var(--t),color var(--t); }
    .sidebar a:hover { background:rgba(255,255,255,0.06); color:var(--text-light); }
    .sidebar a.active { background:rgba(22,163,74,0.15); color:var(--green-l); font-weight:700; }
    .main-content { padding:2.5rem; overflow-y:auto; }
    .cliente-card { display:flex; align-items:center; gap:1.25rem; padding:1.25rem 1.5rem; background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:0.75rem; transition:border-color var(--t),transform var(--t); }
    .cliente-card:hover { border-color:var(--green); transform:translateY(-1px); }
    .avatar-circle { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#16a34a,#84cc16); display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:900; color:#fff; flex-shrink:0; }
    .empty-state { text-align:center; padding:4rem; color:var(--muted); }
    .empty-state span { font-size:3rem; display:block; margin-bottom:0.75rem; }
    @media (max-width:768px) { .dashboard-layout { grid-template-columns:1fr; } .sidebar { display:none; } .main-content { padding:1.5rem; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="../index.html" class="logo">Gym<span>Connect</span></a>
      <nav>
        <a href="perfil.html">Mi perfil</a>
        <button class="btn btn-outline" style="font-size:0.82rem;" onclick="logout()">Cerrar sesión</button>
      </nav>
    </div>
  </header>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <span class="sidebar-label">Panel</span>
      <a href="perfil.html">👤 Mi perfil</a>
      <a href="rutinas.html">📋 Rutinas</a>
      <a href="../chat/index.html">💬 Mensajes</a>
      <a href="clientes.html" class="active">👥 Clientes</a>
      <a href="resultados.html">🏆 Resultados</a>
      <span class="sidebar-label">Cuenta</span>
      <a href="planes.html">💳 Mi suscripción</a>
      <a href="ajustes.html">⚙️ Ajustes</a>
      <a href="../login.html" onclick="localStorage.clear()">🚪 Salir</a>
    </aside>

    <main class="main-content">
      <div style="margin-bottom:2rem;">
        <h1 style="font-size:1.4rem;font-weight:900;text-transform:uppercase;">Mis clientes</h1>
        <p style="font-size:0.85rem;color:var(--muted);margin-top:0.25rem;">Clientes activos que han contratado tus servicios.</p>
      </div>

      <div id="cargando" style="color:var(--muted);">Cargando clientes…</div>
      <div id="lista"></div>
      <div id="vacio" class="empty-state" style="display:none;">
        <span>👥</span>
        <p>Aún no tienes clientes.<br>Cuando alguien contrate tus servicios aparecerá aquí.</p>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('gc_token');

    function logout() {
      localStorage.clear();
      window.location.href = '../login.html';
    }

    async function cargarClientes() {
      try {
        const res = await fetch(`${API}/api/chat/contactos`, {
          headers: { Authorization: 'Bearer ' + token }
        });
        const clientes = res.ok ? await res.json() : [];
        document.getElementById('cargando').style.display = 'none';

        if (clientes.length === 0) {
          document.getElementById('vacio').style.display = 'block';
          return;
        }

        const lista = document.getElementById('lista');
        lista.innerHTML = clientes.map(c => {
          const iniciales = c.nombre.split(' ').map(p => p[0]).join('').substring(0, 2).toUpperCase();
          const badge = c.esPagador
            ? '<span style="font-size:0.72rem;font-weight:800;background:rgba(22,163,74,0.12);color:var(--green);padding:0.2rem 0.6rem;border-radius:99px;border:1px solid rgba(22,163,74,0.2);">✓ Cliente activo</span>'
            : '<span style="font-size:0.72rem;font-weight:800;background:rgba(100,116,139,0.1);color:var(--muted);padding:0.2rem 0.6rem;border-radius:99px;border:1px solid rgba(100,116,139,0.2);">💬 Solo mensajes</span>';
          return `
            <div class="cliente-card">
              <div class="avatar-circle">${iniciales}</div>
              <div style="flex:1;">
                <div style="font-weight:700;font-size:0.95rem;margin-bottom:0.3rem;">${c.nombre}</div>
                ${badge}
              </div>
              <a href="../chat/index.html?userId=${c.id}&nombre=${encodeURIComponent(c.nombre)}" class="btn btn-outline" style="font-size:0.8rem;padding:0.45rem 0.9rem;">💬 Mensaje</a>
            </div>`;
        }).join('');
      } catch {
        document.getElementById('cargando').textContent = 'Error al cargar clientes.';
      }
    }

    cargarClientes();
  </script>
</body>
</html>
