<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca de ejercicios — MomentFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/config.js"></script>
  <script src="../js/mobile-nav.js"></script>
  <script src="../js/plan-theme.js"></script>
  <script src="../js/auth-guard.js" data-rol="ENTRENADOR"></script>
  <style>
    .dashboard-layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 70px); }
    .sidebar { background:var(--surface); border-right:1px solid rgba(255,255,255,0.06); padding:2rem 1rem; display:flex; flex-direction:column; gap:0.25rem; }
    .sidebar-label { font-size:0.65rem; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:var(--text-2); padding:0 0.75rem; margin:1rem 0 0.4rem; }
    .sidebar a { display:flex; align-items:center; gap:0.6rem; padding:0.65rem 0.75rem; border-radius:8px; font-size:0.85rem; font-weight:600; color:var(--text-2); transition:background 0.12s,color 0.12s; text-decoration:none; }
    .sidebar a:hover { background:rgba(255,255,255,0.06); color:var(--text); }
    .sidebar a.active { background:rgba(22,163,74,0.15); color:var(--brand-light); font-weight:700; }
    .main { padding:2rem 2.5rem; overflow-y:auto; }

    .filtros { display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:1.5rem; align-items:center; }
    .filtros input { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.5rem 0.85rem; color:var(--text); font-size:0.85rem; width:220px; }
    .filtros input:focus { outline:none; border-color:var(--green); }
    .filtros select { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.5rem 0.75rem; color:var(--text); font-size:0.85rem; }
    .filtros select option { background:#ffffff; color:#111827; }

    .ejercicios-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }

    /* ── Card ── */
    .ej-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color 0.15s; position:relative; }
    .ej-card:hover { border-color:rgba(22,163,74,0.3); }
    .ej-img { width:100%; height:130px; object-fit:cover; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:2.5rem; }
    .ej-body { padding:1rem; }
    .ej-nombre { font-size:0.92rem; font-weight:800; margin-bottom:0.3rem; }
    .ej-grupo { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--green); margin-bottom:0.5rem; }
    .ej-tags { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.6rem; }
    .ej-tag { font-size:0.68rem; font-weight:700; padding:0.15rem 0.5rem; border-radius:99px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--muted); }
    .ej-desc { font-size:0.78rem; color:var(--muted); line-height:1.5; }
    .ej-actions { display:flex; gap:0.5rem; margin-top:0.75rem; }
    .ej-badge-propio { font-size:0.65rem; background:rgba(99,102,241,0.12); border:1px solid rgba(99,102,241,0.25); color:#818cf8; border-radius:99px; padding:0.1rem 0.45rem; font-weight:700; }
    .ej-badge-sistema { font-size:0.65rem; background:rgba(22,163,74,0.1); border:1px solid rgba(22,163,74,0.2); color:var(--green); border-radius:99px; padding:0.1rem 0.45rem; font-weight:700; }
    .nivel-basico { color:#34d399; }
    .nivel-intermedio { color:#fbbf24; }
    .nivel-avanzado { color:#f87171; }
    .sin-resultados { grid-column:1/-1; text-align:center; padding:3rem; color:var(--muted); }

    /* Botón eliminar en tarjeta */
    .ej-del-btn {
      position:absolute; top:0.5rem; right:0.5rem;
      background:rgba(220,38,38,0.15); border:1px solid rgba(220,38,38,0.3);
      color:#f87171; border-radius:7px; padding:0.28rem 0.5rem;
      font-size:0.78rem; cursor:pointer; line-height:1;
      transition:background 0.15s;
    }
    .ej-del-btn:hover { background:rgba(220,38,38,0.3); }

    /* ── Móvil: card horizontal ── */
    @media(max-width:768px){
      .dashboard-layout{grid-template-columns:1fr} .sidebar{display:none} .main{padding:1rem 0.85rem 2rem}
      .filtros { flex-direction:column; gap:0.5rem; }
      .filtros input { width:100%; }
      .filtros select { width:100%; }
      .ejercicios-grid { grid-template-columns:1fr; gap:0.6rem; }
      .ej-card { display:flex; flex-direction:row; border-radius:10px; }
      .ej-img { width:72px; height:72px; min-width:72px; font-size:1.6rem; border-radius:0; flex-shrink:0; }
      .ej-body { padding:0.75rem; flex:1; min-width:0; }
      .ej-nombre { font-size:0.85rem; }
      .ej-desc { display:none; }
      .ej-del-btn { top:0.4rem; right:0.4rem; }
    }

    /* Modal */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; padding:1rem; }
    .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; }
    .modal-box h3 { font-size:1.1rem; font-weight:800; margin-bottom:1.25rem; }
    .form-row { margin-bottom:1rem; }
    .form-row label { display:block; font-size:0.78rem; font-weight:700; color:var(--muted); margin-bottom:0.3rem; }
    .form-row input, .form-row select, .form-row textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.6rem 0.75rem; color:var(--text); font-size:0.88rem; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline:none; border-color:var(--green); }
    .form-row select option { background:#ffffff; color:#111827; }
    .modal-btns { display:flex; gap:0.75rem; margin-top:1.5rem; }
    .btn-danger { background:rgba(220,38,38,0.1); border:1px solid rgba(220,38,38,0.3); color:#f87171; border-radius:8px; padding:0.6rem 1.25rem; font-weight:700; cursor:pointer; font-size:0.85rem; }
    .btn-danger:hover { background:rgba(220,38,38,0.2); }

    @media(max-width:768px){ .dashboard-layout{grid-template-columns:1fr} .sidebar{display:none} .main{padding:1rem 0.85rem 5.5rem} }
  </style>
</head>
<body>
<header>
  <div class="container">
    <a href="../index.html" class="logo">Moment<span>Fit</span></a>
    <nav>
      <button class="btn btn-primary" style="font-size:0.82rem;" onclick="localStorage.clear();location.href='../login.html'">Cerrar sesión</button>
    </nav>
  </div>
</header>

<div class="dashboard-layout">
  <aside class="sidebar">
    <span class="sidebar-label">Panel</span>
    <a href="perfil.html">👤 Mi perfil</a>
    <a href="rutinas.html">📋 Rutinas</a>
    <a href="nutricion.html">🥗 Nutrición</a>
    <a href="../chat/index.html">💬 Mensajes</a>
    <a href="clientes.html">👥 Clientes</a>
    <a href="agenda.html">📅 Agenda</a>
    <a href="ejercicios.html" class="active">🏋️ Ejercicios</a>
    <a href="resultados.html">📈 Progreso clientes</a>
    <a href="estadisticas.html">📊 Estadísticas</a>
    <span class="sidebar-label">Cuenta</span>
    <a href="planes.html">💳 Mi suscripción</a>
    <a href="ajustes.html">⚙️ Ajustes</a>
    <a href="../login.html" onclick="localStorage.clear()">🚪 Salir</a>
  </aside>

  <main class="main">
    <div style="margin-bottom:1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
      <div>
        <h1 style="font-size:1.5rem;font-weight:800;">🏋️ Biblioteca de ejercicios</h1>
        <p style="color:var(--muted);font-size:0.88rem;margin-top:0.2rem;">Catálogo de ejercicios del sistema + tus ejercicios personalizados</p>
      </div>
      <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo ejercicio</button>
    </div>

    <div class="filtros">
      <input type="text" id="busqueda" placeholder="Buscar ejercicio…" oninput="filtrar()" />
      <select id="filtroGrupo" onchange="filtrar()">
        <option value="">Todos los grupos</option>
        <option>Pecho</option>
        <option>Espalda</option>
        <option>Hombros</option>
        <option>Bíceps</option>
        <option>Tríceps</option>
        <option>Piernas</option>
        <option>Glúteos</option>
        <option>Core</option>
        <option>Cardio</option>
        <option>Cuerpo completo</option>
      </select>
      <select id="filtroNivel" onchange="filtrar()">
        <option value="">Todos los niveles</option>
        <option>Básico</option>
        <option>Intermedio</option>
        <option>Avanzado</option>
      </select>
    </div>

    <div class="ejercicios-grid" id="grid"><p style="color:var(--muted);">Cargando…</p></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal" style="display:none;">
  <div class="modal-box">
    <h3 id="modalTitulo">Nuevo ejercicio</h3>
    <div class="form-row">
      <label>Nombre *</label>
      <input type="text" id="eNombre" placeholder="p. ej. Press banca" />
    </div>
    <div class="form-row">
      <label>Grupo muscular *</label>
      <select id="eGrupo">
        <option>Pecho</option><option>Espalda</option><option>Hombros</option>
        <option>Bíceps</option><option>Tríceps</option><option>Piernas</option>
        <option>Glúteos</option><option>Core</option><option>Cardio</option>
        <option>Cuerpo completo</option>
      </select>
    </div>
    <div class="form-row">
      <label>Equipamiento</label>
      <input type="text" id="eEquipamiento" placeholder="p. ej. Barra, Mancuernas, Sin equipamiento" />
    </div>
    <div class="form-row">
      <label>Nivel</label>
      <select id="eNivel">
        <option>Básico</option><option>Intermedio</option><option>Avanzado</option>
      </select>
    </div>
    <div class="form-row">
      <label>Descripción / instrucciones</label>
      <textarea id="eDesc" rows="3" placeholder="Cómo ejecutar el ejercicio correctamente…"></textarea>
    </div>
    <div class="form-row">
      <label>URL imagen (opcional)</label>
      <input type="url" id="eImagen" placeholder="https://…" />
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" style="flex:1;" onclick="guardar()">Guardar</button>
      <button id="btnEliminar" class="btn-danger" style="display:none;" onclick="eliminar()">Eliminar</button>
      <button class="btn btn-outline" onclick="cerrar()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const token = () => localStorage.getItem('gc_token');
const hdr = (json) => ({ Authorization: 'Bearer ' + token(), ...(json ? {'Content-Type':'application/json'} : {}) });

let todos = [];
let editId = null;

const EMOJIS = { 'Pecho':'💪','Espalda':'🏋️','Hombros':'🔝','Bíceps':'💪','Tríceps':'💪','Piernas':'🦵','Glúteos':'🍑','Core':'🎯','Cardio':'❤️','Cuerpo completo':'⚡' };

async function cargar() {
  const r = await fetch(`${API}/api/ejercicios`, { headers: hdr() });
  todos = r.ok ? await r.json() : [];
  filtrar();
}

function filtrar() {
  const q = document.getElementById('busqueda').value.toLowerCase();
  const grupo = document.getElementById('filtroGrupo').value;
  const nivel = document.getElementById('filtroNivel').value;

  const lista = todos.filter(e =>
    (!q || e.nombre.toLowerCase().includes(q) || (e.descripcion||'').toLowerCase().includes(q)) &&
    (!grupo || e.grupoMuscular === grupo) &&
    (!nivel || e.nivel === nivel)
  );
  render(lista);
}

function render(lista) {
  if (!lista.length) {
    document.getElementById('grid').innerHTML = '<div class="sin-resultados"><span style="font-size:2.5rem">🔍</span><p style="margin-top:0.75rem;">No se encontraron ejercicios</p></div>';
    return;
  }
  const grupos = {};
  lista.forEach(e => { if (!grupos[e.grupoMuscular]) grupos[e.grupoMuscular] = []; grupos[e.grupoMuscular].push(e); });

  document.getElementById('grid').innerHTML = lista.map(e => {
    const esPropio = !!e.entrenador;
    const nivelClass = e.nivel === 'Básico' ? 'nivel-basico' : e.nivel === 'Avanzado' ? 'nivel-avanzado' : 'nivel-intermedio';
    const imgHtml = e.imagenUrl
      ? `<img src="${e.imagenUrl}" alt="${e.nombre}" style="width:100%;height:130px;object-fit:cover;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="ej-img" style="display:none;">${EMOJIS[e.grupoMuscular]||'🏋️'}</div>`
      : `<div class="ej-img">${EMOJIS[e.grupoMuscular]||'🏋️'}</div>`;

    const eJson = JSON.stringify(e).replace(/'/g,"\\'");
    return `<div class="ej-card">
      ${imgHtml}
      <div class="ej-body">
        <div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.3rem;flex-wrap:wrap;">
          <div class="ej-nombre">${e.nombre}</div>
          ${esPropio ? '<span class="ej-badge-propio">Mío</span>' : '<span class="ej-badge-sistema">Sistema</span>'}
        </div>
        <div class="ej-grupo">${e.grupoMuscular||''}</div>
        <div class="ej-tags">
          ${e.nivel ? `<span class="ej-tag ${nivelClass}">${e.nivel}</span>` : ''}
          ${e.equipamiento ? `<span class="ej-tag">${e.equipamiento}</span>` : ''}
        </div>
        ${e.descripcion ? `<div class="ej-desc">${e.descripcion}</div>` : ''}
        ${esPropio ? `<div class="ej-actions">
          <button class="btn btn-outline" style="font-size:0.78rem;padding:0.3rem 0.75rem;" onclick='editarEj(${eJson})'>✏️ Editar</button>
        </div>` : ''}
      </div>
      ${esPropio ? `<button class="ej-del-btn" onclick='eliminarDirecto(${e.id})' title="Eliminar">🗑</button>` : ''}
    </div>`;
  }).join('');
}

function abrirModal() {
  editId = null;
  document.getElementById('modalTitulo').textContent = 'Nuevo ejercicio';
  document.getElementById('eNombre').value = '';
  document.getElementById('eGrupo').value = 'Pecho';
  document.getElementById('eEquipamiento').value = '';
  document.getElementById('eNivel').value = 'Básico';
  document.getElementById('eDesc').value = '';
  document.getElementById('eImagen').value = '';
  document.getElementById('btnEliminar').style.display = 'none';
  document.getElementById('modal').style.display = 'flex';
}

function editarEj(e) {
  editId = e.id;
  document.getElementById('modalTitulo').textContent = 'Editar ejercicio';
  document.getElementById('eNombre').value = e.nombre;
  document.getElementById('eGrupo').value = e.grupoMuscular || 'Pecho';
  document.getElementById('eEquipamiento').value = e.equipamiento || '';
  document.getElementById('eNivel').value = e.nivel || 'Básico';
  document.getElementById('eDesc').value = e.descripcion || '';
  document.getElementById('eImagen').value = e.imagenUrl || '';
  document.getElementById('btnEliminar').style.display = 'block';
  document.getElementById('modal').style.display = 'flex';
}

function cerrar() { document.getElementById('modal').style.display = 'none'; }

async function guardar() {
  const body = {
    nombre: document.getElementById('eNombre').value.trim(),
    grupoMuscular: document.getElementById('eGrupo').value,
    equipamiento: document.getElementById('eEquipamiento').value.trim(),
    nivel: document.getElementById('eNivel').value,
    descripcion: document.getElementById('eDesc').value.trim(),
    imagenUrl: document.getElementById('eImagen').value.trim() || null,
  };
  if (!body.nombre) return alert('El nombre es obligatorio');

  const url = editId ? `${API}/api/ejercicios/${editId}` : `${API}/api/ejercicios`;
  const method = editId ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers: hdr(true), body: JSON.stringify(body) });
  if (r.ok) { cerrar(); cargar(); }
  else alert('Error al guardar');
}

async function eliminar() {
  if (!confirm('¿Eliminar este ejercicio?')) return;
  const r = await fetch(`${API}/api/ejercicios/${editId}`, { method: 'DELETE', headers: hdr() });
  if (r.ok) { cerrar(); cargar(); }
}

async function eliminarDirecto(id) {
  if (!confirm('¿Eliminar este ejercicio?')) return;
  const r = await fetch(`${API}/api/ejercicios/${id}`, { method: 'DELETE', headers: hdr() });
  if (r.ok) cargar();
}

cargar();
</script>
<script src="../js/sidebar-user.js"></script>
</body>
</html>
