<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil — GymConnect</title>
  <link rel="stylesheet" href="../css/main.css" />
  <script src="../js/config.js"></script>
  <script src="../js/auth-guard.js" data-rol="ENTRENADOR"></script>
</head>
<body>

  <header>
    <div class="container">
      <a href="../index.html" class="logo">Gym<span>Connect</span></a>
      <nav>
        <a href="resultados.html">← Panel</a>
        <button class="btn btn-outline" style="font-size:0.82rem;" onclick="logout()">Cerrar sesión</button>
      </nav>
    </div>
  </header>

  <main style="max-width:900px; margin:3rem auto; padding:0 1.5rem;">

    <div id="cargando" style="text-align:center;padding:4rem;color:var(--muted);">Cargando perfil…</div>

    <div id="contenido" style="display:none;">
      <!-- Cabecera del perfil -->
      <div style="display:flex; align-items:center; gap:1.5rem; margin-bottom:2.5rem; flex-wrap:wrap;">
        <div id="avatar" style="width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#fff;flex-shrink:0;"></div>
        <div>
          <h1 id="nombre" style="font-size:1.6rem; font-weight:800;"></h1>
          <p id="ciudad" style="color:var(--muted); margin-top:0.2rem;"></p>
          <div id="rating" style="margin-top:0.5rem;color:#d97706;"></div>
        </div>
      </div>

      <!-- Grid de stats -->
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:2.5rem;">
        <div class="card" style="text-align:center;">
          <div id="precio" style="font-size:1.8rem; font-weight:800; color:var(--green);"></div>
          <div style="font-size:0.85rem; color:var(--muted);">Precio mensual</div>
        </div>
        <div class="card" style="text-align:center;">
          <div id="ratingNum" style="font-size:1.8rem; font-weight:800; color:var(--green);"></div>
          <div style="font-size:0.85rem; color:var(--muted);">Valoración</div>
        </div>
        <div class="card" style="text-align:center;">
          <div id="experiencia" style="font-size:1.8rem; font-weight:800; color:var(--green);"></div>
          <div style="font-size:0.85rem; color:var(--muted);">Experiencia</div>
        </div>
      </div>

      <!-- Bio y especialidades -->
      <div class="card" style="margin-bottom:1.25rem;">
        <h3 style="margin-bottom:0.75rem;">Sobre mí</h3>
        <p id="bio" style="color:var(--text-2); font-size:0.92rem; line-height:1.8;"></p>
        <div id="tags" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:1.25rem;"></div>
      </div>

      <!-- Servicios -->
      <div class="card">
        <h3 style="margin-bottom:0.75rem;">Servicios incluidos</h3>
        <ul id="servicios" style="list-style:none;display:flex;flex-direction:column;gap:0.5rem;"></ul>
      </div>
    </div>

  </main>

  <footer><p>&copy; 2026 <strong>GymConnect</strong></p></footer>

  <script>
    const token = localStorage.getItem('gc_token');
    const user  = JSON.parse(localStorage.getItem('gc_user') || 'null');

    function logout() {
      localStorage.removeItem('gc_token');
      localStorage.removeItem('gc_user');
      window.location.href = '../login.html';
    }

    async function cargarPerfil() {
      try {
        // Buscar el entrenador por usuario logueado
        const res = await fetch(`${API}/api/entrenadores`, {
          headers: { Authorization: 'Bearer ' + token }
        });
        const lista = await res.json();
        // Encontrar el que corresponde al usuario logueado
        const ent = lista.find(e => e.nombre === user.nombre) || lista[0];

        document.getElementById('cargando').style.display = 'none';
        document.getElementById('contenido').style.display = 'block';

        const iniciales = (ent.nombre.charAt(0) + ent.apellido.charAt(0)).toUpperCase();
        const avatar = document.getElementById('avatar');
        avatar.textContent = iniciales;
        avatar.style.background = ent.avatarColor || 'linear-gradient(135deg,#16a34a,#84cc16)';

        document.getElementById('nombre').textContent = ent.nombre + ' ' + ent.apellido;
        document.getElementById('ciudad').textContent = 'Entrenador certificado · ' + (ent.ciudad || '—');
        document.getElementById('rating').innerHTML = '★'.repeat(Math.floor(ent.rating || 5)) +
          ` <span style="color:var(--muted)">${ent.rating} · ${ent.totalResenas} reseñas</span>`;
        document.getElementById('precio').textContent = (ent.precioMensual || 0) + '€';
        document.getElementById('ratingNum').textContent = (ent.rating || 5) + '★';
        document.getElementById('experiencia').textContent = (ent.aniosExperiencia || 0) + ' años';
        document.getElementById('bio').textContent = ent.bio || 'Aún no has añadido una descripción.';
        document.getElementById('tags').innerHTML = (ent.especialidades || [])
          .map(t => `<span class="tag">${t}</span>`).join('');
        document.getElementById('servicios').innerHTML = (ent.servicios || [])
          .map(s => `<li style="display:flex;gap:.6rem;font-size:.88rem;color:var(--text-2);">
            <span style="color:var(--green);font-weight:700;">✓</span>${s}</li>`).join('');

        document.title = ent.nombre + ' — GymConnect';
      } catch (e) {
        document.getElementById('cargando').textContent = 'Error al cargar el perfil.';
      }
    }

    cargarPerfil();
  </script>
</body>
</html>
