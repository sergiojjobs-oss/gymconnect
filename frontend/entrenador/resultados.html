<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progreso clientes — MomentFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/config.js"></script>
  <script src="../js/mobile-nav.js"></script>
  <script src="../js/plan-theme.js"></script>
  <script src="../js/auth-guard.js" data-rol="ENTRENADOR"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    
    
    
    
    
    
    
    /* Client selector — tab-like pills */
    .cliente-selector { display: flex; gap: 0; border-bottom: 1px solid var(--border-subtle); margin-bottom: 1.5rem; overflow-x: auto; scrollbar-width: none; }
    .cliente-selector::-webkit-scrollbar { display: none; }
    .cli-pill { padding: 0.5rem 0.875rem; border: none; background: none; font-size: 0.78rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 1.5px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: color 0.1s, border-color 0.1s; font-family: var(--font); }
    .cli-pill:hover { color: var(--text-2); }
    .cli-pill.active { color: var(--text); border-bottom-color: var(--brand-light); font-weight: 600; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border-subtle); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.25rem; }
    .stat-card { background: var(--surface); padding: 1rem; text-align: center; transition: background 0.1s; border: none; border-radius: 0; }
    .stat-card:hover { background: var(--surface-2); }
    .stat-card .v { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.6px; color: var(--brand-light); line-height: 1; }
    .stat-card .l { font-size: 0.63rem; color: var(--muted); margin-top: 0.25rem; }

    /* Check-in items */
    .checkin-item { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 0.5rem; }
    .checkin-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.65rem; flex-wrap: wrap; }
    .ch-fecha { font-size: 0.72rem; color: var(--muted); font-weight: 500; min-width: 100px; }
    .ch-peso { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.4px; color: var(--text); }
    .ch-diff { font-size: 0.7rem; font-weight: 600; padding: 0.1rem 0.4rem; border-radius: 99px; }
    .diff-down { background: rgba(22,163,74,0.08); color: var(--brand-light); border: 1px solid rgba(22,163,74,0.15); }
    .diff-up   { background: rgba(220,38,38,0.08); color: #f87171;          border: 1px solid rgba(220,38,38,0.15); }
    .ch-energia { color: #fbbf24; font-size: 0.8rem; }
    .ch-foto { width: 56px; height: 56px; border-radius: var(--radius); object-fit: cover; margin-left: auto; }
    .ch-notas { font-size: 0.78rem; color: var(--text-2); line-height: 1.65; margin-bottom: 0.5rem; border-left: 2px solid var(--border-subtle); padding-left: 0.75rem; }
    .cumpl-row { display: flex; align-items: center; gap: 0.75rem; font-size: 0.73rem; color: var(--muted); margin-bottom: 0.5rem; }
    .cumpl-bar { flex: 1; height: 3px; background: var(--surface-3); border-radius: 99px; overflow: hidden; }
    .cumpl-fill { height: 100%; background: var(--brand); border-radius: 99px; }
    .feedback-form { margin-top: 0.65rem; display: flex; gap: 0.4rem; }
    .feedback-form textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 0.7rem; color: var(--text); font-size: 0.78rem; resize: none; font-family: var(--font); }
    .feedback-form textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }
    .feedback-saved { background: rgba(22,163,74,0.04); border: 1px solid rgba(22,163,74,0.12); border-radius: var(--radius); padding: 0.55rem 0.8rem; font-size: 0.76rem; color: var(--text-2); margin-top: 0.4rem; }
    .feedback-saved strong { display: block; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--brand-light); margin-bottom: 0.15rem; }
    @media(max-width:768px){ .stats-row { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
<header>
  <div class="container">
    <a href="../index.html" class="logo">Moment<em>Fit</em></a>
    <nav>
      <button onclick="localStorage.clear();location.href='../login.html'">Cerrar sesión</button>
    </nav>
  </div>
</header>

<div class="dashboard-layout">
  <aside class="sidebar">
    <span class="sidebar-label">Panel</span>
    <a href="perfil.html">Mi perfil</a>
    <a href="rutinas.html">Rutinas</a>
    <a href="nutricion.html">Nutrición</a>
    <a href="../chat/index.html">Mensajes</a>
    <a href="clientes.html">Clientes</a>
    <a href="ficha-cliente.html">Fichas de clientes</a>
    <a href="agenda.html">Agenda</a>
    <a href="ejercicios.html">Ejercicios</a>
    <a href="resultados.html" class="active">Progreso clientes</a>
    <a href="estadisticas.html">Estadísticas</a>
    <span class="sidebar-label">Cuenta</span>
    <a href="planes.html">Mi suscripción</a>
    <a href="ajustes.html">Ajustes</a>
    <a href="../login.html" onclick="localStorage.clear()">Salir</a>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <h1>Progreso clientes</h1>
        <p class="page-subtitle">Sigue el progreso semanal de tus clientes</p>
      </div>
      <div class="page-header-actions">
        <button id="btnPdf" onclick="exportarPDF()" class="btn btn-outline" style="display:none;">Exportar PDF</button>
      </div>
    </div>

    <div class="cliente-selector" id="clientePills"></div>
    <div id="contenido"><p style="color:var(--muted);">Selecciona un cliente para ver su progreso.</p></div>
  </main>
</div>

<script>
const token = () => localStorage.getItem('gc_token');
const hdr = (json) => ({ Authorization: 'Bearer ' + token(), ...(json ? {'Content-Type':'application/json'} : {}) });
let clientes = [], clienteActivo = null;

async function init() {
  try {
    const plan = await fetch(`${API}/api/suscripcion/estado`, { headers: hdr() }).then(r => r.json()).then(d => d.plan).catch(() => 'FREE');
    if (plan === 'ELITE') document.getElementById('btnPdf').style.display = '';

    const todos = await fetch(`${API}/api/chat/contactos`, { headers: hdr() }).then(r => r.json());
    clientes = todos.filter(c => c.esPagador);
    const pills = document.getElementById('clientePills');
    if (!clientes.length) {
      pills.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">Aún no tienes clientes.</p>';
      return;
    }
    pills.innerHTML = clientes.map(c =>
      `<button class="cli-pill" onclick="selCliente(${c.id},'${c.nombre}')" id="pill-${c.id}">${c.nombre}</button>`
    ).join('');

    // Auto-seleccionar desde URL param o el primero
    const params = new URLSearchParams(location.search);
    const presel = params.get('cliente');
    if (presel) {
      const c = clientes.find(x => String(x.id) === presel);
      if (c) { selCliente(c.id, c.nombre); return; }
    }
    selCliente(clientes[0].id, clientes[0].nombre);
  } catch { document.getElementById('contenido').innerHTML = '<p style="color:#dc2626;">Error al cargar.</p>'; }
}

async function selCliente(id, nombre) {
  clienteActivo = id;
  document.querySelectorAll('.cli-pill').forEach(p => p.classList.remove('active'));
  const pill = document.getElementById('pill-'+id);
  if (pill) pill.classList.add('active');

  const el = document.getElementById('contenido');
  el.innerHTML = '<p style="color:var(--muted);">Cargando…</p>';

  try {
    const lista = await fetch(`${API}/api/progreso/cliente/${id}`, { headers: hdr() }).then(r => r.json());

    if (!lista.length) {
      el.innerHTML = `<div class="sin-datos"><span style="font-size:2.5rem;">📊</span><p style="margin-top:1rem;">${nombre} aún no ha registrado ningún check-in.</p></div>`;
      return;
    }

    // Stats resumen
    const pesos = lista.filter(p => p.peso).map(p => p.peso);
    const pesoInicial = pesos[pesos.length-1];
    const pesoActual = pesos[0];
    const diferencia = pesos.length > 1 ? (pesoActual - pesoInicial).toFixed(1) : null;
    const avgCumpl = lista.filter(p => p.cumplimiento != null).reduce((a,b) => a + b.cumplimiento, 0) / lista.filter(p => p.cumplimiento != null).length;
    const avgEnergia = lista.filter(p => p.energia).reduce((a,b) => a + b.energia, 0) / lista.filter(p => p.energia).length;

    el.innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="v">${pesoActual ? pesoActual+'kg' : '—'}</div><div class="l">Peso actual</div></div>
        <div class="stat-card"><div class="v" style="color:${diferencia<0?'var(--green)':'#dc2626'}">${diferencia != null ? (diferencia>0?'+':'')+diferencia+'kg' : '—'}</div><div class="l">Cambio total</div></div>
        <div class="stat-card"><div class="v">${isNaN(avgCumpl)?'—':Math.round(avgCumpl)+'%'}</div><div class="l">Cumplimiento medio</div></div>
        <div class="stat-card"><div class="v">${isNaN(avgEnergia)?'—':'⭐'.repeat(Math.round(avgEnergia))}</div><div class="l">Energía media</div></div>
      </div>

      ${lista.map((p, i) => {
        const prev = lista[i+1];
        let diffHtml = '';
        if (prev && p.peso && prev.peso) {
          const d = (p.peso - prev.peso).toFixed(1);
          if (d !== '0.0') diffHtml = `<span class="ch-diff ${d<0?'diff-down':'diff-up'}">${d>0?'+':''}${d}kg</span>`;
        }
        return `
          <div class="checkin-item" id="ci-${p.id}">
            <div class="checkin-head">
              <div class="ch-fecha">${new Date(p.fecha).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
              ${p.peso ? `<div class="ch-peso">${p.peso}kg ${diffHtml}</div>` : ''}
              ${p.grasaCorporal ? `<span style="font-size:0.8rem;color:var(--muted);">${p.grasaCorporal}% grasa</span>` : ''}
              ${p.energia ? `<div class="ch-energia">${'⭐'.repeat(p.energia)}</div>` : ''}
              ${p.fotoUrl ? `<img src="${p.fotoUrl}" class="ch-foto" />` : ''}
            </div>
            ${p.cumplimiento != null ? `
              <div class="cumpl-row">
                <span>Cumplimiento: ${p.cumplimiento}%</span>
                <div class="cumpl-bar"><div class="cumpl-fill" style="width:${p.cumplimiento}%"></div></div>
              </div>` : ''}
            ${p.notas ? `<div class="ch-notas">📝 ${p.notas}</div>` : ''}
            ${p.notasEntrenador
              ? `<div class="feedback-saved"><strong>Tu feedback</strong>${p.notasEntrenador}</div>
                 <button class="btn btn-outline" style="font-size:0.75rem;padding:0.35rem 0.75rem;margin-top:0.5rem;" onclick="mostrarFeedback(${p.id})">✏️ Editar feedback</button>
                 <div id="fb-${p.id}" style="display:none;margin-top:0.5rem;"></div>`
              : `<div id="fb-${p.id}">
                  <div class="feedback-form">
                    <textarea rows="2" placeholder="Escribe tu feedback para este check-in…" id="fbt-${p.id}"></textarea>
                    <button class="btn btn-primary" style="font-size:0.8rem;padding:0.5rem 1rem;" onclick="enviarFeedback(${p.id})">Enviar</button>
                  </div>
                </div>`}
          </div>`;
      }).join('')}`;
  } catch { el.innerHTML = '<p style="color:#dc2626;">Error al cargar el progreso.</p>'; }
}

function mostrarFeedback(id) {
  const el = document.getElementById('fb-'+id);
  el.style.display = 'block';
  el.innerHTML = `<div class="feedback-form">
    <textarea rows="2" id="fbt-${id}" placeholder="Actualiza tu feedback…"></textarea>
    <button class="btn btn-primary" style="font-size:0.8rem;padding:0.5rem 1rem;" onclick="enviarFeedback(${id})">Guardar</button>
  </div>`;
}

async function enviarFeedback(id) {
  const txt = document.getElementById('fbt-'+id)?.value?.trim();
  if (!txt) return;
  try {
    const r = await fetch(`${API}/api/progreso/${id}/feedback`,
      { method:'PUT', headers: hdr(true), body: JSON.stringify({ notasEntrenador: txt }) });
    if (!r.ok) throw new Error();
    selCliente(clienteActivo, '');
  } catch { alert('Error al guardar el feedback.'); }
}

init();

async function exportarPDF() {
  if (!clienteActivo) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const nombre = document.querySelector('.cli-pill.active')?.textContent || 'Cliente';
  const hoy = new Date().toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' });
  const W = 210, PL = 14, PR = 196;

  // ── Paleta ──
  const C = {
    purple: [124, 58, 237], purpleL: [167, 139, 250],
    green:  [22, 163, 74],  greenL:  [74, 222, 128],
    dark:   [15, 23, 42],   gray:    [100, 116, 139],
    light:  [241, 245, 249],border:  [226, 232, 240],
    white:  [255, 255, 255],red:     [220, 38, 38]
  };

  const rgb = (arr) => ({ r: arr[0], g: arr[1], b: arr[2] });

  // ── PÁGINA 1: PORTADA ──────────────────────────────────────────
  // Fondo degradado simulado con rectángulos
  doc.setFillColor(...C.dark); doc.rect(0, 0, W, 297, 'F');
  doc.setFillColor(...C.purple); doc.rect(0, 0, W, 80, 'F');

  // Patrón decorativo (círculos)
  doc.setFillColor(139, 92, 246); doc.setGState(doc.GState({ opacity: 0.3 }));
  doc.circle(170, 20, 40, 'F');
  doc.circle(30, 65, 25, 'F');
  doc.setGState(doc.GState({ opacity: 1 }));

  // Logo
  doc.setTextColor(...C.white);
  doc.setFontSize(28); doc.setFont('helvetica', 'bold');
  doc.text('MomentFit', PL, 28);
  doc.setFontSize(11); doc.setFont('helvetica', 'normal');
  doc.setTextColor(...C.purpleL);
  doc.text('Plataforma de entrenamiento personal', PL, 36);

  // Título
  doc.setTextColor(...C.white);
  doc.setFontSize(22); doc.setFont('helvetica', 'bold');
  doc.text('Informe de Progreso', PL, 54);
  doc.setFontSize(12); doc.setFont('helvetica', 'normal');
  doc.setTextColor(...C.purpleL);
  doc.text(`Cliente: ${nombre}`, PL, 63);
  doc.text(`Generado el ${hoy}`, PL, 70);

  // Stats resumen en cards
  const cards = document.querySelectorAll('.stat-card');
  if (cards.length) {
    const statsData = Array.from(cards).map(c => ({
      v: c.querySelector('.v')?.textContent?.replace(/⭐/g,'★') || '—',
      l: c.querySelector('.l')?.textContent || ''
    }));

    const cardW = 42, cardH = 28, gap = 4;
    const totalW = statsData.length * cardW + (statsData.length - 1) * gap;
    const startX = (W - totalW) / 2;
    let cx = startX;
    const cy = 95;

    statsData.forEach(s => {
      // Card background
      doc.setFillColor(...C.white); doc.setDrawColor(...C.border);
      doc.roundedRect(cx, cy, cardW, cardH, 3, 3, 'FD');
      // Accent top
      doc.setFillColor(...C.purple);
      doc.roundedRect(cx, cy, cardW, 2.5, 1, 1, 'F');
      // Value
      doc.setTextColor(...C.purple);
      doc.setFontSize(14); doc.setFont('helvetica', 'bold');
      doc.text(s.v, cx + cardW/2, cy + 13, { align:'center' });
      // Label
      doc.setTextColor(...C.gray);
      doc.setFontSize(7); doc.setFont('helvetica', 'normal');
      doc.text(s.l.toUpperCase(), cx + cardW/2, cy + 21, { align:'center' });
      cx += cardW + gap;
    });
  }

  // Decorative bottom text
  doc.setTextColor(...C.gray);
  doc.setFontSize(8);
  doc.text('Plan Elite · Informes de progreso avanzados', W/2, 285, { align:'center' });
  doc.setDrawColor(...C.purple); doc.setLineWidth(0.5);
  doc.line(PL, 288, PR, 288);
  doc.setFontSize(7); doc.setTextColor(...C.gray);
  doc.text(`Pág. 1`, PR, 292, { align:'right' });

  // ── PÁGINA 2+: HISTORIAL ──────────────────────────────────────
  doc.addPage();

  const drawPageHeader = () => {
    doc.setFillColor(...C.purple); doc.rect(0, 0, W, 16, 'F');
    doc.setTextColor(...C.white); doc.setFontSize(9); doc.setFont('helvetica', 'bold');
    doc.text('MomentFit · Informe de Progreso', PL, 10);
    doc.text(nombre, PR, 10, { align:'right' });
  };

  const drawPageFooter = (page) => {
    doc.setDrawColor(...C.border); doc.setLineWidth(0.3);
    doc.line(PL, 286, PR, 286);
    doc.setFontSize(7); doc.setTextColor(...C.gray); doc.setFont('helvetica', 'normal');
    doc.text('Generado por MomentFit · Plan Elite', PL, 291);
    doc.text(`Pág. ${page}`, PR, 291, { align:'right' });
  };

  drawPageHeader();

  // Sección título
  let y = 26, pageNum = 2;
  doc.setTextColor(...C.dark); doc.setFontSize(14); doc.setFont('helvetica', 'bold');
  doc.text('Historial de Check-ins', PL, y); y += 3;
  doc.setFillColor(...C.purple); doc.rect(PL, y, 30, 0.8, 'F'); y += 6;

  const checkins = document.querySelectorAll('.checkin-item');

  checkins.forEach((ci, idx) => {
    const fecha = ci.querySelector('.ch-fecha')?.textContent || '';
    const pesoRaw = ci.querySelector('.ch-peso')?.textContent?.trim() || '';
    const peso = pesoRaw.replace(/[↑↓+\-\d\.kg\s]+$/,'').trim(); // solo número+kg
    const cumplTxt = ci.querySelector('.cumpl-row span')?.textContent || '';
    const cumplNum = parseInt(cumplTxt.match(/\d+/)?.[0]) || 0;
    const notas = ci.querySelector('.ch-notas')?.textContent?.replace('📝 ','').trim() || '';
    const feedback = ci.querySelector('.feedback-saved')?.textContent?.replace('Tu feedback','').trim() || '';

    const notasLines = notas ? doc.splitTextToSize(notas, 120) : [];
    const feedLines  = feedback ? doc.splitTextToSize(feedback, 120) : [];
    const cardH = 14 + (peso ? 6 : 0) + (cumplTxt ? 9 : 0) + (notasLines.length * 4.5) + (feedLines.length * 4.5) + 6;

    // Nueva página si no cabe
    if (y + cardH > 282) {
      drawPageFooter(pageNum++);
      doc.addPage();
      drawPageHeader();
      y = 26;
    }

    // Card border
    doc.setFillColor(...C.light); doc.setDrawColor(...C.border); doc.setLineWidth(0.3);
    doc.roundedRect(PL, y, PR - PL, cardH, 2, 2, 'FD');

    // Acento izquierdo
    doc.setFillColor(...C.purple);
    doc.roundedRect(PL, y, 2, cardH, 1, 1, 'F');

    // Número de check-in + fecha
    const ci_y = y + 7;
    doc.setFillColor(...C.purple);
    doc.circle(PL + 9, y + 5.5, 4, 'F');
    doc.setTextColor(...C.white); doc.setFontSize(7); doc.setFont('helvetica', 'bold');
    doc.text(String(checkins.length - idx), PL + 9, y + 7, { align:'center' });

    doc.setTextColor(...C.dark); doc.setFontSize(10); doc.setFont('helvetica', 'bold');
    doc.text(fecha.charAt(0).toUpperCase() + fecha.slice(1), PL + 16, ci_y);

    // Peso
    if (pesoRaw) {
      doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor(...C.purple);
      doc.text(pesoRaw.split(' ')[0] + ' kg', PR - 2, ci_y, { align:'right' });
    }

    let ry = ci_y + 6;

    // Barra de cumplimiento
    if (cumplTxt && cumplNum > 0) {
      doc.setTextColor(...C.gray); doc.setFontSize(7.5); doc.setFont('helvetica', 'normal');
      doc.text('CUMPLIMIENTO', PL + 5, ry);
      doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
      doc.setTextColor(cumplNum >= 80 ? C.green[0] : C.gray[0], cumplNum >= 80 ? C.green[1] : C.gray[1], cumplNum >= 80 ? C.green[2] : C.gray[2]);
      doc.text(`${cumplNum}%`, PR - 2, ry, { align:'right' });
      ry += 3;
      // Track
      doc.setFillColor(...C.border); doc.roundedRect(PL + 5, ry, 140, 2.5, 1, 1, 'F');
      // Fill
      const fillColor = cumplNum >= 80 ? C.green : cumplNum >= 50 ? C.purple : C.red;
      doc.setFillColor(...fillColor);
      doc.roundedRect(PL + 5, ry, Math.max(2, 140 * cumplNum / 100), 2.5, 1, 1, 'F');
      ry += 6;
    }

    // Notas del cliente
    if (notasLines.length) {
      doc.setTextColor(...C.gray); doc.setFontSize(7); doc.setFont('helvetica', 'bold');
      doc.text('NOTAS CLIENTE', PL + 5, ry); ry += 3.5;
      doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...C.dark);
      doc.text(notasLines, PL + 5, ry); ry += notasLines.length * 4.5;
    }

    // Feedback entrenador
    if (feedLines.length) {
      doc.setFillColor(240, 253, 244); doc.setDrawColor(...C.greenL);
      doc.roundedRect(PL + 5, ry - 1, 176, feedLines.length * 4.5 + 6, 1.5, 1.5, 'FD');
      doc.setTextColor(...C.green); doc.setFontSize(7); doc.setFont('helvetica', 'bold');
      doc.text('FEEDBACK ENTRENADOR', PL + 8, ry + 2.5); ry += 5;
      doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...C.dark);
      doc.text(feedLines, PL + 8, ry); ry += feedLines.length * 4.5;
    }

    y += cardH + 4;
  });

  drawPageFooter(pageNum);

  doc.save(`informe-${nombre.replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10)}.pdf`);
}
