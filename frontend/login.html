<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — GymConnect</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header>
    <div class="container">
      <a href="index.html" class="logo">Gym<span>Connect</span></a>
      <nav>
        <a href="registro.html">¿No tienes cuenta? <strong>Regístrate</strong></a>
      </nav>
    </div>
  </header>

  <div class="form-page">
    <div class="form-box">
      <h2>Bienvenido de nuevo</h2>
      <p class="sub">Inicia sesión para continuar en GymConnect</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary form-submit">Iniciar sesión →</button>
      </form>

      <div class="form-divider">o continúa con</div>

      <button class="btn btn-ghost form-submit" style="margin-top:0;">
        <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" width="18" alt="" />
        Entrar con PayPal
      </button>

      <p class="form-footer">¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a></p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
