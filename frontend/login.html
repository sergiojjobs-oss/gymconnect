<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — MomentFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #262626; --border-subtle: #1a1a1a;
      --text: #ededed; --text-2: #a3a3a3; --muted: #525252;
      --brand: #16a34a; --brand-hover: #15803d; --brand-light: #22c55e;
      --radius: 6px; --radius-lg: 8px;
    }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      height: 54px; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(10,10,10,0.9); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-size: 0.88rem; font-weight: 800; letter-spacing: -0.4px; color: var(--text); text-decoration: none; }
    .logo em { color: var(--brand-light); font-style: normal; }
    .header-link { font-size: 0.78rem; color: var(--text-2); text-decoration: none; transition: color 0.12s; }
    .header-link:hover { color: var(--text); }
    .header-link strong { color: var(--brand-light); font-weight: 600; }

    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }

    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }
    .auth-eyebrow {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(22,163,74,0.08); border: 1px solid rgba(22,163,74,0.18);
      color: var(--brand-light); font-size: 0.62rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 0.2rem 0.65rem; border-radius: 99px; margin-bottom: 1rem;
    }
    .auth-card h2 {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.8px;
      color: var(--text); margin-bottom: 0.3rem; line-height: 1.2;
    }
    .auth-card .sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }

    .alert-expired {
      display: none; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.18);
      border-radius: var(--radius); padding: 0.65rem 0.875rem; margin-bottom: 1rem;
      font-size: 0.78rem; color: #f87171; font-weight: 500;
    }

    .form-group { margin-bottom: 0.875rem; }
    .form-group label {
      display: block; font-size: 0.68rem; font-weight: 600;
      color: var(--text-2); margin-bottom: 0.35rem; letter-spacing: 0.1px;
    }
    .form-group input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.625rem 0.875rem;
      font-size: 0.85rem; color: var(--text); font-family: 'Inter', sans-serif;
      transition: border-color 0.12s, box-shadow 0.12s; color-scheme: dark;
    }
    .form-group input::placeholder { color: var(--muted); }
    .form-group input:focus {
      outline: none; border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
    }

    .btn-submit {
      width: 100%; padding: 0.7rem 1.25rem; border-radius: var(--radius);
      border: none; cursor: pointer; font-family: 'Inter', sans-serif;
      font-size: 0.88rem; font-weight: 700; background: var(--brand); color: #fff;
      transition: background 0.12s; margin-top: 0.25rem;
    }
    .btn-submit:hover { background: var(--brand-hover); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-divider {
      display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0;
      font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border-subtle); }

    .auth-footer { text-align: center; font-size: 0.78rem; color: var(--muted); }
    .auth-footer a { color: var(--brand-light); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { color: var(--text); }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(12px);
      background: var(--surface); color: var(--text); padding: 0.75rem 1.25rem;
      border-radius: var(--radius); font-size: 0.82rem; font-weight: 600;
      border: 1px solid var(--border); opacity: 0;
      transition: opacity 0.2s, transform 0.2s; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.toast-error { border-color: rgba(239,68,68,0.3); color: #f87171; }

    @media (max-width: 480px) {
      .auth-card { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Moment<em>Fit</em></a>
    <a href="registro.html" class="header-link">¿No tienes cuenta? <strong>Regístrate</strong></a>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-eyebrow">✓ Acceso seguro</div>
      <h2>Bienvenido<br>de nuevo</h2>
      <p class="sub">Inicia sesión para continuar en MomentFit</p>

      <div id="expiredAlert" class="alert-expired">
        ⏱ Tu sesión ha expirado. Inicia sesión de nuevo.
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-submit" id="loginBtn">Iniciar sesión →</button>
      </form>

      <div class="auth-divider">o</div>

      <div class="auth-footer">
        ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
  <script>
    if (new URLSearchParams(location.search).get('expired')) {
      document.getElementById('expiredAlert').style.display = 'block';
    }
  </script>
</body>
</html>
