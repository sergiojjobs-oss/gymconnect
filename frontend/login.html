<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — GymConnect</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header>
    <a href="index.html" class="logo">Gym<span>Connect</span></a>
    <nav>
      <a href="registro.html">¿No tienes cuenta? <strong>Regístrate</strong></a>
    </nav>
  </header>

  <main style="min-height: calc(100vh - 64px); display:flex; align-items:center; padding: 2rem;">
    <div class="form-box">
      <h2>Bienvenido de nuevo</h2>
      <p class="sub">Inicia sesión para continuar en GymConnect</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;">
          Iniciar sesión
        </button>
      </form>

      <div class="divider">o continúa con</div>

      <button class="btn btn-outline" style="width:100%; justify-content:center;">
        <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" width="18" alt="PayPal" />
        Entrar con PayPal
      </button>

      <p class="form-footer">
        ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
      </p>
    </div>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
