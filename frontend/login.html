<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - GymConnect</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .login-box {
      max-width: 400px;
      margin: 4rem auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .login-box h2 {
      margin-bottom: 1.5rem;
      color: #1a1a2e;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      color: #444;
    }
    .form-group input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: #e94560;
    }
    .login-box .btn {
      width: 100%;
      text-align: center;
      margin-top: 0.5rem;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.8rem;
    }
    .login-box p {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #555;
    }
    .login-box p a {
      color: #e94560;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>GymConnect</h1>
    <nav>
      <a href="index.html">Inicio</a>
    </nav>
  </header>

  <main>
    <div class="login-box">
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn">Entrar</button>
      </form>
      <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 GymConnect</p>
  </footer>

  <script src="js/login.js"></script>
</body>
</html>
