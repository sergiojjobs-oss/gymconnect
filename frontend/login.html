<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — GymConnect</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--text-light);
      padding: 0.85rem 1.5rem;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      border-left: 4px solid var(--green);
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-info  { border-left-color: var(--green); }
    .toast-error { border-left-color: #dc2626; }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <a href="index.html" class="logo">Gym<span>Connect</span></a>
      <nav>
        <a href="registro.html">¿No tienes cuenta? <strong>Regístrate</strong></a>
      </nav>
    </div>
  </header>

  <div class="form-page">
    <div class="form-box">
      <h2>Bienvenido de nuevo</h2>
      <p class="sub">Inicia sesión para continuar en GymConnect</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary form-submit">Iniciar sesión →</button>
      </form>

      <div class="form-divider">o continúa con</div>

      <button class="btn btn-ghost form-submit" style="margin-top:0;">
        <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" width="18" alt="" />
        Entrar con PayPal
      </button>

      <p class="form-footer">¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a></p>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/login.js"></script>
</body>
</html>
