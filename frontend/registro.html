<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — GymConnect</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header>
    <div class="container">
      <a href="index.html" class="logo">Gym<span>Connect</span></a>
      <nav>
        <a href="login.html">¿Ya tienes cuenta? <strong>Inicia sesión</strong></a>
      </nav>
    </div>
  </header>

  <div class="form-page">
    <div class="form-box" style="max-width:480px;">
      <h2>Crear cuenta</h2>
      <p class="sub">Elige cómo quieres usar GymConnect</p>

      <div class="role-grid">
        <label>
          <input type="radio" name="rol" value="cliente" checked hidden />
          <div class="role-card active" id="card-cliente">
            <span>🏃</span>
            <strong>Soy cliente</strong>
            <small>Busco un entrenador</small>
          </div>
        </label>
        <label>
          <input type="radio" name="rol" value="entrenador" hidden />
          <div class="role-card" id="card-entrenador">
            <span>💪</span>
            <strong>Soy entrenador</strong>
            <small>Ofrezco mis servicios</small>
          </div>
        </label>
      </div>

      <form id="registroForm">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" placeholder="Ana" required />
          </div>
          <div class="form-group">
            <label>Apellido</label>
            <input type="text" placeholder="García" required />
          </div>
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" placeholder="tu@email.com" required />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="Mínimo 8 caracteres" required />
        </div>
        <button type="submit" class="btn btn-primary form-submit">Crear cuenta gratis →</button>
      </form>

      <p class="form-footer">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>
  </div>

  <script>
    document.querySelectorAll('input[name="rol"]').forEach(radio => {
      radio.addEventListener('change', () => {
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
        radio.closest('label').querySelector('.role-card').classList.add('active');
      });
    });
  </script>
</body>
</html>
